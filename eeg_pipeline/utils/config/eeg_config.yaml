project:
  task: "thermalactive"  # Task name used in BIDS paths and file naming
  random_state: 42  # Random seed for reproducible analyses (used in decoding, ML models, behavior analysis, phase features)
paths:
  bids_root: "../../data/bids_output"  # BIDS-formatted raw data directory
  deriv_root: "../../data/derivatives"  # Processed derivatives output directory
  source_data: "../../data/source_data"  # Raw source data directory
  # Note: Standard BIDS directory names ("features", "preprocessed", "logs", "stats", "plots", "eeg")
  # are hardcoded in path construction functions (utils/io/paths.py) as they follow BIDS conventions
  # and should not be configurable. These are standard across all BIDS-compliant datasets.

###################################################################
# SHARED DEFINITIONS & ANCHORS
###################################################################
# These definitions are referenced throughout the config using YAML anchors (& and *)
# to ensure consistency and avoid duplication.

frequency_bands: &frequency_bands  # Standard EEG frequency band definitions [Hz] (used throughout TFR/feature analysis)
  delta: [1.0, 3.9]  # Delta band range
  theta: [4.0, 7.9]  # Theta band range
  alpha: [8.0, 12.9]  # Alpha band range
  beta: [13.0, 30.0]  # Beta band range
  gamma: [30.1, 80.0]  # Gamma band range

plateau_window: &plateau_window [3.0, 10.5]  # Thermal plateau period [s] for feature extraction (used throughout analysis)
baseline_window_tfr: &baseline_window_tfr [-3.0, -0.5]  # TFR baseline correction window [s] relative to stimulus (shortened to avoid filter edge effects)
default_baseline_tfr_correlation: &default_baseline_tfr_correlation [-0.5, -0.01]  # Default baseline window [s] for TFR correlation plots (fallback when config unavailable)
min_samples_for_stats: &min_samples_for_stats 2  # Minimum samples required for statistical tests (shared threshold)
default_alpha: &default_alpha 0.05  # Default significance threshold (alpha level) - primary anchor for all alpha values
epsilon_std: &epsilon_std 1e-12  # Small epsilon for standard deviation/division operations (prevents division by zero)
epsilon_psd: &epsilon_psd 1e-20  # Small epsilon for power spectral density/log operations (prevents log(0))
epsilon_amp: &epsilon_amp 1e-10  # Small epsilon for amplitude calculations (prevents division by zero)
epsilon_amp_pac: &epsilon_amp_pac 1e-9  # Small epsilon for PAC amplitude normalization
min_epochs_default: &min_epochs_default 20  # Default minimum epochs required for analysis
fisher_z_clip_min: &fisher_z_clip_min -0.999999  # Lower clipping bound for Fisher z-transform (prevents -inf)
fisher_z_clip_max: &fisher_z_clip_max 0.999999  # Upper clipping bound for Fisher z-transform (prevents +inf)
ci_percentile_low: &ci_percentile_low 2.5  # Lower percentile for bootstrap CI (2.5th percentile)
ci_percentile_high: &ci_percentile_high 97.5  # Upper percentile for bootstrap CI (97.5th percentile)
log_base: &log_base 10.0  # Base for logarithm calculations (log10)
percentage_multiplier: &percentage_multiplier 100.0  # Multiplier to convert proportions to percentages
default_min_subjects_topomaps: &default_min_subjects_topomaps 3  # Default minimum subjects required for group topomaps
default_correlation_vmin: &default_correlation_vmin -0.6  # Default minimum correlation value for colormaps
default_correlation_vmax: &default_correlation_vmax 0.6  # Default maximum correlation value for colormaps
default_n_permutations_quick: &default_n_permutations_quick 100  # Default permutations for quick tests (reduced for testing)
default_n_permutations_full: &default_n_permutations_full 1000  # Default permutations for full statistical tests
default_cluster_n_perm: &default_cluster_n_perm 100  # Default cluster permutation count (reduced for testing)
min_samples_per_covariate: &min_samples_per_covariate 5  # Minimum samples per covariate for partial correlation
partial_corr_base_samples: &partial_corr_base_samples 5  # Base samples required for partial correlation
min_dof_for_correlation: &min_dof_for_correlation 2  # Minimum degrees of freedom for correlation validity
min_samples_for_bayes: &min_samples_for_bayes 3  # Minimum samples required for Bayes factor calculation
alpha_transparent: &alpha_transparent 0.2  # Light transparency for fills/grids
alpha_medium: &alpha_medium 0.5  # Medium transparency for reference lines/annotations
default_fit_line_points: &default_fit_line_points 100  # Number of points for regression fit lines
default_time_grid_points: &default_time_grid_points 200  # Number of points for time grid interpolation
default_labelpad: &default_labelpad 10  # Default label padding [points]
rois: &roi_definitions  # Region of interest definitions: regex patterns matching channel names
  Frontal:  # Prefrontal + frontal (bilateral)
    - "^(Fp1|Fp2|Fpz|AF3|AF4|AF7|AF8|F1|F2|F3|F4|F5|F6|F7|F8)$"

  Sensorimotor_Contra_R:  # Right (contralateral) peri-Rolandic for left-forearm pain
    - "^(FC2|FC4|FC6|C2|C4|C6|CP2|CP4|CP6)$"

  Sensorimotor_Ipsi_L:  # Left (ipsilateral) peri-Rolandic
    - "^(FC1|FC3|FC5|C1|C3|C5|CP1|CP3|CP5)$"

  Temporal_Contra_R:  # Right temporal/S2-ish
    - "^(FT8|FT10|T8|TP8|TP10)$"

  Temporal_Ipsi_L:  # Left temporal/S2-ish
    - "^(FT7|FT9|T7|TP7|TP9)$"

  ParOccipital_Contra_R:  # Right posterior (parietal–occipital)
    - "^(P2|P4|P6|P8|PO4|PO8|O2)$"

  ParOccipital_Ipsi_L:  # Left posterior (parietal–occipital)
    - "^(P1|P3|P5|P7|PO3|PO7|O1)$"

  ParOccipital_Midline:  # Midline posterior
    - "^(Pz|POz|Oz)$"

  Midline_ACC_MCC:  # Midline cingulate/medial sensorimotor approximation
    - "^(Fz|Cz|CPz)$"

###################################################################
# DATA STRUCTURE & METADATA
###################################################################
event_columns:  # Column name candidates searched in event/metadata DataFrames (first match used)
  temperature:  # Thermal stimulus temperature column names (used in pick_event_columns, extract_temperature_data)
    - "stimulus_temp"
    - "stimulus_temperature"
    - "temp"
    - "temperature"
  rating:  # Pain rating/VAS column names (used in pick_event_columns, resolve_columns)
    - "vas_final_coded_rating"
    - "vas_final_rating"
    - "vas_rating"
    - "pain_intensity"
    - "pain_rating"
    - "rating"
  pain_binary:  # Binary pain classification column names (used in ERP analysis, pick_event_columns)
    - "pain_binary_coded"
    - "pain_binary"
    - "pain"

alignment:  # Epoch-event alignment parameters
  allow_misaligned_trim: false  # Whether to allow trimming misaligned epochs (used in data loading)
  min_alignment_samples: 5  # Maximum tolerable mismatch (diff) for trimming when allow_misaligned_trim=True. Mismatches <= this value will be trimmed; larger mismatches will error.

###################################################################
# DATA PROCESSING
###################################################################
preprocessing:  # Preprocessing parameters
  resample_freq: 500  # Target sampling frequency [Hz] for resampling (used in validation)

raw_to_bids:  # Raw data to BIDS conversion parameters
  default_montage: "easycap-M1"  # Default MNE montage name for channel positions
  default_line_freq: 60.0  # Line noise frequency [Hz] for notch filtering

io:  # I/O utility constants
  constants:  # Validation thresholds and I/O parameters
    percent_threshold: 5.0  # Threshold for detecting percent format data (used in detect_data_format)
    temperature_min: 35.0  # Minimum valid temperature [°C] (used in validate_temperature_values)
    temperature_max: 55.0  # Maximum valid temperature [°C] (used in validate_temperature_values)
    max_missing_fraction: 0.5  # Maximum fraction of missing channels allowed for interpolation (used in align_epochs_to_pivot_chs)

###################################################################
# VALIDATION & QUALITY CONTROL
###################################################################
validation:  # Data validation parameters (used in validation.py)
  min_epochs: *min_epochs_default  # Minimum number of epochs required for analysis (reference to shared min_epochs_default)
  min_channels: 10  # Minimum number of channels required for analysis
  max_amplitude_uv: 500  # Maximum amplitude threshold [µV] for artifact detection

analysis:  # General analysis parameters (used across multiple analysis modules)
  min_subjects_for_group: 2  # Minimum number of subjects required for group-level analysis (used in decoding cross-validation, group feature aggregation)
  min_subjects_for_topomaps: *default_min_subjects_topomaps  # Minimum subjects required for group topomaps (reference to shared default_min_subjects_topomaps)
erp_analysis:  # ERP analysis parameters (used in 01_erp_analysis.py)
  erp:  # Event-related potential analysis settings
    picks: "eeg"  # Channel type selector for MNE (used in _extract_erp_config)
    combine: "gfp"  # Channel combination method: "gfp" (global field power) or "mean" (used in ERP plotting)
    include_tmax_in_crop: false  # Whether to include tmax endpoint in epoch cropping (used in _prepare_epochs_for_erp)
    default_crop_tmin: null  # Default epoch start time [s] (null = use full epoch)
    default_crop_tmax: null  # Default epoch end time [s] (null = use full epoch)
    pain_color: "crimson"  # Color for pain condition in ERP plots (used in _extract_erp_config)
    nonpain_color: "navy"  # Color for non-pain condition in ERP plots (used in _extract_erp_config)
    baseline_window: [-0.2, 0.0]  # ERP baseline correction window [s] relative to stimulus onset
    output_files:  # ERP plot output filenames
      pain_gfp: "erp_pain_binary_gfp.svg"  # Pain/non-pain GFP comparison plot
      pain_butterfly: "erp_pain_binary_butterfly.svg"  # Pain/non-pain butterfly plot (all channels)
      temp_gfp: "erp_by_temperature_gfp.svg"  # Temperature-stratified GFP plot
      temp_butterfly: "erp_by_temperature_butterfly.svg"  # Temperature-stratified butterfly plot
      temp_butterfly_template: "erp_by_temperature_butterfly_{label}.svg"  # Template for temperature-specific plots
      counts_file_name: "erp_trial_counts.tsv"  # Filename for trial count statistics (used in extract_erp_stats)

###################################################################
# TIME-FREQUENCY ANALYSIS
###################################################################
time_frequency_analysis:  # Time-frequency analysis parameters (used in 02_tfr_analysis.py, 03_feature_extraction.py)
  baseline_mode: "logratio"  # Baseline correction mode: "logratio" (log10(power/baseline)) or "percent" or "zscore" (used in save_tfr_with_sidecar, apply_baseline_safe)
  baseline_window: *baseline_window_tfr  # TFR baseline correction window [s] relative to stimulus (used in apply_baseline_safe, validate_baseline_window_pre_stimulus)
  plateau_window: *plateau_window  # Thermal plateau period [s] for feature extraction (used in feature extraction, ML alignment)
  bands: *frequency_bands  # Frequency band definitions (reference to frequency_bands anchor)
  tfr: &tfr_defaults  # Time-frequency representation parameters (used in compute_tfr, compute_adaptive_n_cycles)
    freq_min: 1.0  # Minimum frequency [Hz] for TFR computation (logspace start, same as frequency_bands.delta[0])
    freq_max: 100.0  # Maximum frequency [Hz] for TFR computation (logspace end)
    n_freqs: 40  # Number of frequency bins (logarithmically spaced)
    custom_freqs: null  # Custom frequency array (null = use logspace, used in group/features.py)
    min_cycles: 3.0  # Minimum number of cycles for Morlet wavelets (used in compute_adaptive_n_cycles)
    min_cycles_check: 2.0  # Minimum cycles threshold for validation (used in compute_adaptive_n_cycles)
    n_cycles_factor: 2.0  # Multiplier for adaptive cycle calculation: n_cycles = freq / factor (used in compute_adaptive_n_cycles)
    time_res_threshold_low_freq: 5.0  # Time resolution threshold [ms] for low frequencies (quality check)
    time_res_threshold_high_freq: 2.0  # Time resolution threshold [ms] for high frequencies (quality check)
    workers: -1  # Number of parallel workers for TFR computation (-1 = all CPUs, same pattern as statistics.cluster_n_jobs and decoding.analysis.perm_refit_n_jobs, used in compute_tfr)
  constants:  # TFR processing constants (used in tfr_utils.py)
    baseline_sentinel: "BASELINED:"  # String marker in TFR comment indicating baseline correction applied
    min_log_value: *epsilon_psd  # Minimum value for log10 operations (prevents log(0), reference to epsilon_psd)
    min_divisor: *epsilon_std  # Minimum divisor for division operations (prevents division by zero, reference to epsilon_std)
    min_samples_for_stats: *min_samples_for_stats  # Minimum samples required for statistical tests (shared minimum threshold)
    min_samples_for_baseline_validation: *min_samples_per_covariate  # Minimum samples required for baseline window validation (used in validate_baseline_window, validate_baseline_indices, reference to shared min_samples_per_covariate)
    low_freq_threshold: 8.0  # Frequency threshold [Hz] below which cycles are checked (used in log_tfr_resolution)
    low_cycles_warning_threshold: 2.5  # Cycle count threshold triggering warnings for low frequencies
    freq_threshold_for_time_res: 2.0  # Frequency threshold [Hz] for time resolution checks
    mad_scaling_factor: 1.4826  # Median absolute deviation scaling (converts MAD to SD: MAD * 1.4826 ≈ SD)
  rois: *roi_definitions  # ROI definitions (reference to roi_definitions anchor)
  min_baseline_samples: *min_samples_per_covariate  # Minimum samples required in baseline window (used in validate_baseline_indices, reference to shared min_samples_per_covariate)
  min_channels_for_group: 4  # Minimum channels required for group-level TFR aggregation (used in load_tfr_data)

###################################################################
# FEATURE EXTRACTION
###################################################################
feature_engineering:  # Feature extraction parameters (used in 03_feature_extraction.py)
  save_tfr_with_sidecar: true  # Whether to save TFR files with BIDS sidecar JSON metadata
  features:  # Feature extraction window definitions
    plateau_window: *plateau_window  # Thermal plateau period [s] for feature extraction (reference to plateau_window anchor)
    ramp_end: 3.0  # Stimulus ramp ends at 3s
    offset_start: 10.5  # Start of post-plateau/offset window for rebound features
    min_valid_band_fraction: 0.0  # Minimum fraction of valid bands required for feature extraction (0.0 = no requirement)
    temporal_bins:  # Coarse temporal bins for time-resolved feature extraction (bins span plateau_window: 3.0-10.5s)
      - start: 3.0  # Early plateau bin start [s] (matches plateau_window start)
        end: 5.0  # Early plateau bin end [s]
        label: "early"  # Bin label
      - start: 5.0  # Mid plateau bin start [s]
        end: 7.5  # Mid plateau bin end [s]
        label: "mid"  # Bin label
      - start: 7.5  # Late plateau bin start [s]
        end: 10.5  # Late plateau bin end [s] (matches plateau_window end)
        label: "late"  # Bin label
    temporal_bins_fine:  # Fine temporal bins for HRF modeling (~1s resolution)
      - start: 3.0
        end: 4.07
        label: "t1"
      - start: 4.07
        end: 5.14
        label: "t2"
      - start: 5.14
        end: 6.21
        label: "t3"
      - start: 6.21
        end: 7.28
        label: "t4"
      - start: 7.28
        end: 8.35
        label: "t5"
      - start: 8.35
        end: 9.42
        label: "t6"
      - start: 9.42
        end: 10.5
        label: "t7"
  microstates:  # EEG microstate extraction parameters (used in extract_microstate_features)
    n_states: 4  # Number of microstate clusters to extract
    min_peak_distance_ms: 20.0  # Minimum distance [ms] between GFP peaks for microstate segmentation (used in extract_templates_from_trials)
    peaks_per_epoch: 5  # Number of GFP peaks to extract per epoch (used in extract_templates_from_trials)
    max_gfp_peaks_per_epoch: 100  # Maximum GFP peaks per epoch (used in extract_templates_from_trials)
    min_correlation: 0.25  # Minimum correlation threshold for microstate assignment (used in _compute_microstate_metrics_for_trial)
    gfp_min_percentile: 25.0  # Minimum GFP percentile threshold for valid samples (used in _compute_microstate_metrics_for_trial)
    min_valid_fraction: 0.5  # Minimum fraction of valid samples required per trial (used in _compute_microstate_metrics_for_trial)
    min_run_ms: 10.0  # Minimum microstate run duration [ms] for valid state transitions (used in _compute_microstate_metrics_for_trial)
    polarity_invariant_kmeans: false  # Whether to use polarity-invariant KMeans clustering (experimental, used in extract_templates_from_trials)
    use_fixed_templates: false  # Use per-subject clustering unless templates are supplied
    use_group_templates: true  # If true, attempt to load group-level templates before per-subject clustering
    build_group_templates: true  # If true, aggregate subject templates into a group template (requires multiple subjects processed)
  aperiodic:  # Aperiodic component extraction parameters (used in extract_aperiodic_features)
    psd_window: *baseline_window_tfr  # Time window [s] for PSD computation (must be pre-stimulus, ≤ 0) - uses TFR baseline window
    peak_rejection_z: 3.5  # Z-score threshold for robust peak rejection during aperiodic fitting
    min_fit_points: 5  # Minimum frequency points required for valid aperiodic fit
    min_samples: 5  # Minimum time samples required in PSD window
    constants:  # Feature extraction constants
    epsilon_std: *epsilon_std  # Small epsilon for standard deviation calculations (prevents division by zero, reference to shared epsilon_std)
    epsilon_psd: *epsilon_psd  # Small epsilon for power spectral density calculations (prevents log(0), reference to shared epsilon_psd)
    epsilon_amp: *epsilon_amp  # Small epsilon for amplitude calculations (prevents division by zero, reference to shared epsilon_amp)
    epsilon_normalization: *epsilon_std  # Epsilon for normalization operations (prevents division by zero, reference to shared epsilon_std)
    ascii_uppercase_a: 65  # ASCII code for 'A' (used in microstate labeling)
    min_correlation_samples: 5  # Minimum samples required for correlation calculations
    kmeans_n_init: 20  # Number of k-means initializations for microstate clustering
    aperiodic_fmin: 2.0  # Minimum frequency [Hz] for aperiodic component fitting
    aperiodic_fmax: 40.0  # Maximum frequency [Hz] for aperiodic component fitting
    pac_epsilon_amp: *epsilon_amp_pac  # Small epsilon for PAC amplitude normalization (reference to shared epsilon_amp_pac)
    itpc_epsilon_amp: *epsilon_std  # Small epsilon for ITPC amplitude normalization (reference to shared epsilon_std)
    min_epochs_for_features: 10  # Minimum epochs required for feature extraction
    min_channels_for_connectivity: 3  # Minimum channels required for connectivity computation
    min_samples_for_psd: 64  # Minimum samples required for PSD computation
    min_valid_fraction: 0.5  # Minimum fraction of valid data required
    min_epochs_for_plv: 10  # Minimum epochs required for PLV computation
    min_edge_samples: 30  # Minimum samples required for edge-level statistics
  parallel:  # Parallel processing parameters (used in precompute_data, aperiodic fitting, complexity/temporal features, PAC, connectivity, feature group execution)
    n_jobs_bands: -1  # Number of parallel jobs for band computation (1 = sequential, >1 = parallel, same pattern as time_frequency_analysis.tfr.workers and statistics.cluster_n_jobs, used in core.py)
    n_jobs_aperiodic: -1  # Number of parallel jobs for aperiodic fitting (epoch×channel parallelization, used in aperiodic.py)
    n_jobs_complexity: -1  # Number of parallel jobs for complexity feature extraction (epoch parallelization, used in pipeline.py)
    n_jobs_temporal: -1  # Number of parallel jobs for temporal feature extraction (epoch parallelization, used in pipeline.py)
    n_jobs_pac: -1  # Number of parallel jobs for PAC computation (ROI×phase×amp combination parallelization, used in phase.py)
    n_jobs_connectivity: -1  # Number of parallel jobs for connectivity computation (per-band parallelization, used in connectivity.py)
    n_jobs_feature_groups: -1  # Number of parallel jobs for running independent feature extractors (used in pipeline.py); keep low to limit memory
  connectivity:  # Connectivity feature parameters
    enable_imcoh: false  # Enable imaginary coherence computation (robust to volume conduction)
    enable_pli: false  # Enable Phase Lag Index computation
    aec_mode: "orth"  # Amplitude Envelope Correlation mode: "orth" (orthogonalized) or "standard"
    graph_top_prop: 0.1  # Top proportion of edges to keep for graph metrics (0.1 = top 10%)
    small_world_n_rand: 100  # Number of random graphs for small-world sigma calculation
    epsilon: *epsilon_std  # Small epsilon for connectivity calculations (prevents division by zero, used in connectivity.py _EPSILON and _compute_imcoh_matrices, reference to shared epsilon_std)
    sliding_window_len: 1.0  # Sliding window length [s] for dynamic connectivity (used in compute_sliding_connectivity_features)
    sliding_window_step: 0.5  # Sliding window step size [s] for dynamic connectivity (used in compute_sliding_connectivity_features)
    sliding_graph_top_prop: 0.1  # Top proportion of edges for sliding window graph metrics (falls back to graph_top_prop if not set, used in compute_sliding_connectivity_features)
    sliding_highpass_hz: null  # Highpass filter [Hz] for sliding connectivity (falls back to highpass_hz if not set, used in compute_sliding_connectivity_features)
    sliding_lowpass_hz: null  # Lowpass filter [Hz] for sliding connectivity (falls back to lowpass_hz if not set, used in compute_sliding_connectivity_features)
  spectral:  # Spectral extras (band ratios, entropy)
    ratio_pairs:  # Band power ratios to compute (num/den)
      - ["theta", "beta"]
      - ["alpha", "beta"]
      - ["alpha", "gamma"]
    edge_percent: 0.95  # Percentile for spectral edge frequency
  complexity:  # Complexity feature parameters
    pe_order: 3  # Permutation entropy embedding dimension
    pe_delay: 1  # Permutation entropy time delay
    sampen_m: 2  # Sample entropy embedding dimension
    sampen_r_mult: 0.2  # Sample entropy tolerance (as fraction of std)
    sampen_max_samples: 500  # Maximum samples to use for sample entropy computation (used in extract_sample_entropy_features)
    min_samples_for_entropy: 100  # Minimum samples required for entropy calculations (used in extract_permutation_entropy_features, extract_sample_entropy_features)
    include_sample_entropy: false  # Disable sample entropy by default (computationally expensive)
  temporal:  # Time-domain feature parameters
    include_percentiles: false  # Include percentile features
    include_derivatives: true  # Include derivative-based features
  erds:  # ERD/ERS feature parameters
    n_temporal_windows: 5  # Number of temporal windows during plateau for windowed ERD/ERS
  gfp:  # Global Field Power feature parameters
    min_peak_distance_samples: 10  # Minimum distance between GFP peaks
  roi_features:  # ROI-averaged feature parameters
    pain_rois:  # ROIs for pain-specific feature extraction (subset of full ROI list)
      - "Sensorimotor_Contra_R"
      - "Sensorimotor_Ipsi_L"
      - "Frontal"
      - "Midline_ACC_MCC"
    asymmetry_pairs:  # Channel pairs for hemispheric asymmetry features
      - ["F3", "F4"]
      - ["C3", "C4"]
      - ["P3", "P4"]
      - ["O1", "O2"]
  precomputed_groups:  # Feature groups to extract with efficient precomputed pipeline
    - "erds"  # ERD/ERS features (alpha/beta desync correlates with BOLD)
    - "spectral"  # Spectral features (IAF, relative power, band ratios, entropy)
    - "gfp"  # Global Field Power features
    - "roi"  # ROI-averaged features (maps to fMRI brain regions)
    - "temporal"  # Time-domain features (variance, RMS, etc.)
    - "complexity"  # Complexity features (permutation entropy, Hjorth)
    - "ratios"  # Band power ratios (theta/beta, alpha/theta)
    - "asymmetry"  # Hemispheric asymmetry features
  condition_features:  # Condition-specific feature types (pain vs non-pain)
    - "spectral"  # Spectral features by condition
    - "complexity"  # Complexity features by condition
    - "temporal"  # Temporal features by condition
    - "erds"  # ERD/ERS features by condition
    - "global"  # Global features by condition
  pac:  # Phase-amplitude coupling parameters (used in phase.py)
    estimators: ["tort", "plv", "cl_corr"]  # PAC estimators to compute
    pairs:  # Phase/amp band pairs for MI/PLV/CL corr
      - ["theta", "gamma"]
      - ["alpha", "gamma"]
    phase_range: [4.0, 8.0]  # Phase-frequency range [Hz] (e.g., theta, used in compute_pac_comodulograms)
    amp_range: [30.0, 80.0]  # Amplitude-frequency range [Hz] (e.g., gamma, used in compute_pac_comodulograms, approximately matches frequency_bands.gamma)
    phase_step_hz: 1.0  # Step size for phase frequencies [Hz] (used in compute_pac_comodulograms)
    amp_step_hz: 5.0  # Step size for amplitude frequencies [Hz] (used in compute_pac_comodulograms)
    plateau_window: *plateau_window  # Time window [s] to compute PAC (defaults to TFR plateau if unset, used in compute_pac_comodulograms)
    min_epochs: *min_epochs_default  # Minimum number of epochs required for PAC computation (used in compute_pac_comodulograms, reference to shared min_epochs_default)
    n_surrogates: 200  # Number of surrogate tests for PAC significance (used in compute_pac_comodulograms)
  cross_frequency:  # Cross-frequency coupling parameters (used in cfc.py)
    methods: ["mi"]  # PAC methods: "mi" (modulation index), "glm", "mvl"
    phase_bands: ["theta", "alpha"]  # Bands for phase signal
    amp_bands: ["gamma"]  # Bands for amplitude signal
    n_bins: 18  # Number of phase bins for MI calculation
    phase_phase_pairs:  # n:m phase locking pairs: [band1, band2, n, m]
      - ["theta", "alpha", 1, 2]
      - ["theta", "beta", 1, 4]
    extract_bicoherence: false  # Extract bicoherence features (slow)
    bicoherence_fmax: 50.0  # Max frequency for bicoherence
  temporal_dynamics:  # Advanced temporal dynamics features (used in dynamics.py)
    extract_autocorrelation: true  # Extract autocorrelation features
    autocorr_max_lag_sec: 2.0  # Maximum lag for autocorrelation [s]
    extract_dfa: true  # Extract Detrended Fluctuation Analysis
    dfa_scales: [4, 8, 16, 32, 64, 128, 256]  # Scales for DFA
    extract_mse: false  # Extract Multiscale Entropy (slow)
    mse_scales: [1, 2, 4, 8, 16, 32]  # Scales for MSE
    mse_m: 2  # Embedding dimension for MSE
    mse_r_mult: 0.15  # Tolerance multiplier for MSE
  asymmetry:  # Hemispheric asymmetry pairs for precomputed asymmetry features
    pairs:
      - ["F3", "F4"]
      - ["C3", "C4"]
      - ["P3", "P4"]
      - ["O1", "O2"]
  source_features:  # Source-level feature parameters (used in source.py)
    enabled: false  # Enable source-level features (requires forward model)
    method: "dSPM"  # Source estimation method: "dSPM", "MNE", "sLORETA"
    lambda2: 0.1111  # Regularization (1/SNR²)
    conn_method: "wpli"  # Source connectivity method: "wpli", "plv", "aec"
  quality:  # Feature quality and validation parameters
    min_snr_db: 3.0  # Minimum signal-to-noise ratio [dB] for valid trials
    max_muscle_power_ratio: 0.3  # Maximum high-frequency (>30Hz) power ratio
    variance_threshold: 0.01  # Minimum variance for valid features
    min_variance: 1e-10  # Minimum variance threshold for quality checks (used in compute_feature_quality)
    correlation_threshold: 0.95  # Threshold for identifying redundant features
    compute_icc: false  # Compute intraclass correlation for reliability
    outlier_z_threshold: 3.0  # Z-score threshold for outlier detection
    min_finite_fraction: 0.8  # Minimum fraction of finite values for a usable feature (used in compute_feature_quality)
    max_outlier_fraction: 0.1  # Maximum outlier fraction for usable feature (used in compute_feature_quality)
    normality_test_threshold: 5000  # Sample size threshold for normality test (Shapiro-Wilk for n < threshold, else D'Agostino-Pearson, used in quality.py)


###################################################################
# BEHAVIORAL ANALYSIS
###################################################################
behavior_analysis:  # Behavioral correlation analysis parameters (used in 04_behavioral_correlations.py, behavior.py)
  n_jobs: -1  # Number of parallel jobs for behavioral analyses (-1 = all CPUs)
  pooling_strategy: "within_subject_centered"  # Pooling strategy for group aggregation: "within_subject_centered" (z-score within subject) or "pooled" (raw pooling)
  min_samples:  # Minimum samples for correlation validity (centralized thresholds)
    channel: 10  # Per-channel correlations
    roi: 20  # ROI-level correlations (more stringent for aggregated data)
    default: 5  # Fallback minimum
    edge: 15  # Connectivity edge correlations (lowered to keep segmented edges)
    temporal: 15  # Temporal window analysis
  min_trials:  # Trial count thresholds
    per_condition: 15  # For condition-wise (pain/nonpain) analysis
    for_tfr: 20  # For time-frequency analysis
  feature_registry:  # Centralized mapping of feature files and patterns (used in feature_correlator.py)
    files:
      power: "features_power.tsv"
      power_plateau: "features_power_plateau.tsv"
      microstate: "features_microstates.tsv"
      precomputed: "features_precomputed.tsv"
      dynamics: "features_dynamics.tsv"
    source_to_feature_type:
      power: "power"
      power_plateau: "power"  # Plateau grouped with power
      precomputed: "precomputed"
      connectivity: "connectivity"
      microstates: "microstate"
      aperiodic: "aperiodic"
      itpc: "itpc"
      pac: "pac"
      source: "source"
      dynamics: "dynamics"
    feature_type_hierarchy:
      power:
        subtypes: ["direct", "plateau", "correlation", "baseline"]
        structure: "band × channel × time"
      connectivity:
        subtypes: ["aec", "wpli", "plv", "pli", "imcoh", "coh", "icoh", "sliding_window", "graph"]
        structure: "measure × band × channel_pair"
      microstate:
        subtypes: ["coverage", "duration", "occurrence", "transition", "gev", "entropy", "valid", "state"]
        structure: "metric × state"
      precomputed:
        subtypes: ["gfp", "roi", "power", "spectral", "temporal", "complexity", "connectivity", "pac", "itpc", "dynamics", "asymmetry", "other"]
        structure: "mixed"
      itpc:
        subtypes: ["itpc"]
        structure: "band × channel × time_bin"
      pac:
        subtypes: ["pac"]
        structure: "roi × phase_freq × amp_freq × time"
    feature_patterns:  # Regex-based parsing (order-independent)
      power_segmented: '^power_(ramp|plateau|offset)_(\\w+)_(.+)$'
      erds_windowed: '^erds_(\\w+)_(\\w+)_(early|mid|late|t\\d+)$'
      erds: '^erds_(\\w+)_(.+)$'
      iaf: '^iaf_(.+)$'
      iaf_power: '^iaf_power_(.+)$'
      relative_power: '^relative_(\\w+)_(.+)$'
      band_ratio: '^ratio_(\\w+)_(\\w+)_(.+)$'
      spectral_entropy: '^spectral_entropy_(.+)$'
      spectral_edge: '^spectral_edge_(\\d*\\.?\\d*)_(.+)$'
      peak_freq: '^peak_freq_(\\w+)_(.+)$'
      bandwidth: '^bandwidth_(\\w+)_(.+)$'
      temporal_stat: '^(mean|var|std|skew|kurt|median|iqr)_(.+)$'
      amplitude: '^(rms|p2p|line_length|nle)_(.+)$'
      zero_cross: '^zero_cross_(.+)$'
      slope: '^slope_(.+)$'
      permutation_entropy: '^pe_(.+)$'
      sample_entropy: '^sampen_(.+)$'
      hjorth: '^hjorth_(activity|mobility|complexity)_(.+)$'
      lzc: '^lzc_(.+)$'
      hurst: '^hurst_(.+)$'
      dfa: '^dfa_(.+)$'
      gfp: '^gfp_(mean|std|max|peak_count|peak_rate)$'
      global_plv: '^global_plv_(\\w+)$'
      variance_explained: '^var_explained_(.+)$'
      roi_power: '^roi_pow_(\\w+)_(.+)$'
      roi_asymmetry: '^asymmetry_(\\w+)_(.+)$'
      roi_erds: '^roi_erds_(\\w+)_(.+)$'
      roi_laterality: '^laterality_(\\w+)_(.+)$'
      ms_coverage: '^ms_coverage_(\\w+)$'
      ms_duration: '^ms_duration_(\\w+)$'
      ms_occurrence: '^ms_occurrence_(\\w+)$'
      ms_transition: '^ms_transition_(\\w+)_(\\w+)$'
      ms_gev: '^ms_gev_(\\w+)$'
      ms_entropy: '^ms_entropy$'
      itpc: '^itpc_(\\w+)_(.+)_(\\w+)$'
      plv: '^plv_(\\w+)_(.+)_(.+)$'
      pac: '^pac_(.+)$'
      aperiodic: '^aper_(slope|offset|knee)_(.+)$'
      powcorr: '^powcorr_(\\w+)_(.+)$'
      conn_graph: '^(wpli|aec|imcoh|pli)_(\\w+)_(geff|clust|pc|smallworld)$'
      connectivity_segmented: '^conn_(plv|imcoh|psi|aec|aec_orth)_(ramp|plateau|offset)_(\\w+)_(.+)$'
      itpc_segmented: '^itpc_(\\w+)_(\\w+)_(active|ramp|offset)$'
      dynamics_burst_segmented: '^dynamics_(\\w+)_(ramp|plateau|offset)_burst_(rate|mean_duration|mean_amplitude)$'
    feature_classifiers:  # Ordered (most specific first)
      - label: "gfp"
        startswith: ["gfp_"]
        contains: ["global_field_power"]
      - label: "erds"
        startswith: ["erds_"]
      - label: "itpc"
        startswith: ["itpc_"]
        contains: ["itpc"]
      - label: "pac"
        regex: "(?i)(^pac_|phase.*amplitude)"
      - label: "microstate"
        regex: "(?i)^(ms_|state_|microstate)"
      - label: "aperiodic"
        startswith: ["aper_", "aperiodic_"]
      - label: "source"
        startswith: ["src_", "source_"]
      - label: "connectivity"
        regex: "(?i)^(wpli_|plv_|aec_|imcoh_|pli_|conn_|coh_|icoh_|sync_|coherence_|connectivity_|sw.*corr)"
      - label: "graph"
        regex: "(?i)(_geff|_clust|_pc|_smallworld|_modularity|_betweenness|_pathlength|_efficiency|_charpath|_deg_|_strength_|_cc_|_bc_|_ec_)"
      - label: "power"
        regex: "(?i)^(pow_|power_|baseline_|powcorr_|delta_|theta_|alpha_|beta_|gamma_)"
        exclude_startswith: ["power_relative_"]
      - label: "spectral"
        regex: "(?i)^(iaf_|relative_|ratio_|spectral_|peak_|bandwidth_|spectral_edge_|spectral_entropy_|freq_|dominant_freq_|spec_|sef50_|sef75_|sef90_|sef95_|se_|slope_|logpow_|relpow_|peakfreq_|peakpow_|peakprom_)"
      - label: "complexity"
        regex: "(?i)^(pe_|sampen_|hjorth_|lzc_|hurst_|dfa_|permutation_entropy_|sample_entropy_|approximate_entropy_|shannon_|renyi_)"
      - label: "spectral"
        startswith: ["cog_"]
      - label: "roi"
        regex: "(?i)(frontal|sensorimotor|parietal|occipital|paroccipital|midline|contra_|ipsi_|_contra|_ipsi|^temporal.*(_|_r$|_l$)|^roi_|_roi_|asymmetry_|laterality_)"
      - label: "temporal"
        regex: "(?i)^(mean_|var_|std_|skew_|kurt_|rms_|p2p_|median_|iqr_|line_length_|nle_|zero_cross_|variance_|stddev_)"
      - label: "temporal"
        regex: "^(max|mean|std|min|median|range|variance|all)$"
      - label: "temporal"
        regex: "(?i)(_max$|_min$|_mean$|_std$|_median$|_sum$|_var$)"
      - label: "temporal"
        startswith: ["global_"]
      - label: "roi"
        startswith: ["roi_"]
        contains: ["_roi_"]
      - label: "spectral"
        channel_name: true  # Bare channel names (e.g., Fz)
      - label: "connectivity"
        channel_pair: true  # Two channel names joined by underscore
      - label: "microstate"
        regex: "^\\d+$"
  effect_size:  # Effect size reporting
    compute_cohens_d: true  # Compute Cohen's d for condition comparisons
    compute_eta_squared: false  # Compute eta-squared (ANOVA-style effect size)
    benchmarks:  # Effect size benchmark thresholds (Cohen's d conventions, used in plotting/behavioral/statistical_validity.py)
      small: 0.2  # Small effect size threshold (Cohen's d)
      medium: 0.5  # Medium effect size threshold (Cohen's d)
      large: 0.8  # Large effect size threshold (Cohen's d)
      typical_pain_eeg: 0.35  # Typical effect size for pain-EEG correlations (empirical threshold)
    cohens_q_benchmarks:  # Cohen's q benchmarks for correlation difference effect sizes (used in condition_correlations.py)
      small: 0.1  # Small effect size threshold (Cohen's q)
      medium: 0.3  # Medium effect size threshold (Cohen's q)
      large: 0.5  # Large effect size threshold (Cohen's q)
    correlation_benchmarks:  # Correlation effect size benchmarks (used in analysis/behavior/exports.py, feature_correlator.py)
      negligible: 0.1  # Negligible correlation threshold (|r| < 0.1)
      small: 0.3  # Small correlation threshold (0.1 ≤ |r| < 0.3)
      medium: 0.5  # Medium correlation threshold (0.3 ≤ |r| < 0.5)
      large: 1.0  # Large correlation threshold (|r| ≥ 0.5)
    time_frequency_heatmap:  # Time-frequency correlation heatmap parameters (used in correlate_power_topomaps)
      n_jobs: -1  # Parallel jobs for TF correlations (-1 = all cores)
      time_resolution: 0.1  # Temporal bin size [s] for heatmap
      freq_resolution: 2.0  # Frequency bin size [Hz] for heatmap
      time_window: [0.0, 10.5]  # Time window [s] for heatmap analysis
      freq_range: [1.0, 80.0]  # Frequency range [Hz] for heatmap analysis (matches frequency_bands: delta[0] to gamma[1])
      alpha: *default_alpha  # Significance threshold for heatmap (reference to shared default_alpha)
      roi_selection: null  # ROI to restrict analysis to (null = all channels)
      n_cycles_factor: 2.0  # Cycles factor for TFR computation in heatmap (same as time_frequency_analysis.tfr.n_cycles_factor)
      decim: 4  # Temporal decimation factor for heatmap TFR
      n_cluster_perm: 10  # Number of cluster permutation tests (quick check)
  cluster_correction:  # Cluster-based permutation test parameters (used in cluster correction)
    alpha: *default_alpha  # Cluster significance threshold (reference to shared default_alpha)
    n_permutations: *default_n_permutations_full  # Number of permutations for cluster correction (reference to shared default_n_permutations_full, minimum 1000 recommended for reliable p-value estimation at alpha=0.05)
    min_permutations: *default_n_permutations_full  # Minimum permutations for reliable cluster test p-values at alpha=0.05 (reference to shared default_n_permutations_full)
    default_n_permutations: *default_n_permutations_quick  # Default number of permutations for quick cluster tests (used in cluster_tests.py when n_perm not specified, reference to shared default_n_permutations_quick)
  temporal_correlation_topomaps:  # Temporal correlation topomap parameters (used in compute_temporal_correlations_by_condition)
    window_size_ms: 500.0  # Window size [ms] for temporal binning
    min_trials_per_condition: 5  # Minimum trials required per condition (temperature/pain) for correlation computation
  sliding_states:  # Sliding state analysis parameters (used in connectivity.py)
    n_clusters: 3  # Number of clusters for sliding state analysis (used in compute_sliding_state_metrics)
    kmeans_n_init: 10  # Number of KMeans initializations (used in compute_sliding_state_metrics)
  statistics:  # Statistical analysis parameters (used in _compute_correlation_statistics, compute_power_roi_stats)
    correlation_method: "spearman"  # Correlation method: "spearman" (rank) or "pearson" (linear, used in pipelines/behavior.py, same default as statistics.use_spearman_default)
    fdr_alpha: *default_alpha  # False discovery rate threshold (reference to shared default_alpha anchor, used in apply_global_fdr)
    n_permutations: *default_n_permutations_full  # Number of permutation tests (used in compute_permutation_pvalues, ROI stats, topomap correlations, reference to shared default_n_permutations_full). Minimum 1000 recommended for reliable p-value estimation at alpha=0.05
    default_n_permutations: *default_n_permutations_quick  # Default number of permutations for quick tests (used in cluster tests, reference to shared default_n_permutations_quick)
    default_alpha: *default_alpha  # Default significance threshold (reference to shared default_alpha anchor)
    default_n_bootstrap: *default_n_permutations_full  # Default number of bootstrap iterations (reference to shared default_n_permutations_full)
    min_samples_per_covariate: *min_samples_per_covariate  # Minimum samples per covariate for partial correlation (reference to shared min_samples_per_covariate)
    partial_corr_base_samples: *partial_corr_base_samples  # Base samples required for partial correlation (reference to shared partial_corr_base_samples)
    min_dof_for_correlation: *min_dof_for_correlation  # Minimum degrees of freedom for correlation validity (reference to shared min_dof_for_correlation)
    partial_correlation_alpha: *default_alpha  # Significance threshold for partial correlation mediation tests (used in condition_correlations.py, reference to shared default_alpha)
    epsilon_corr: *epsilon_amp  # Small epsilon for correlation calculations (prevents division by zero, reference to shared epsilon_amp)
    max_correlation: 0.9999  # Maximum correlation value (prevents 1.0 for Fisher z-transform)
    partial_covariates: ["temperature", "block"]  # Covariates for partial correlation (e.g., ["temperature", "block"])
    bootstrap_ci_percentiles:  # Bootstrap confidence interval percentiles (reference to shared ci_percentile values)
      - *ci_percentile_low
      - *ci_percentile_high
    bootstrap_use_fisher_z: false  # Whether to use Fisher z-transform for bootstrap correlations (used in stats.py)
    bootstrap_bias_correction: true  # Whether to apply bias correction to bootstrap correlations (used in stats.py)
    min_nodes_for_heatmap: 3  # Minimum nodes/channels required for heatmap computation
    min_channels_for_adjacency: 2  # Minimum channels required for adjacency matrix construction (used with statistics.constants.k_neighbors_adjacency)
    min_samples_roi: *min_samples_for_stats  # Minimum samples required for ROI-level statistics (used in _compute_roi_correlation_stats, reference to shared min_samples_for_stats, note: different from statistics.min_samples_per_channel which is 5)
    min_samples_channel: 10  # Minimum samples required for channel-level statistics (2x statistics.min_samples_per_channel for more stringent channel-level requirements)
    edge_bootstrap_n: 1000  # Number of bootstrap samples for edge-level statistics (used in connectivity.py)
    max_edges_to_correlate: 500  # Maximum number of edges to correlate (samples if exceeded to reduce computation)
    connectivity_min_correlation: 0.3  # Minimum correlation threshold for connectivity correlations (used in compute_connectivity_correlations)
    connectivity_max_pvalue: 0.05  # Maximum p-value threshold for connectivity correlations (used in compute_connectivity_correlations)
    correlation_filter_threshold: 0.2  # Minimum absolute correlation threshold for filtering edges (used in connectivity_correlations.py)
    condition_comparison_alpha: *default_alpha  # Significance threshold for condition comparison (pain vs non-pain, reference to shared default_alpha)
    min_samples_per_condition: 5  # Minimum samples required per condition (pain/non-pain) for condition comparisons (used in condition_correlations.py)
    min_samples_for_sliding_state: 5  # Minimum samples required for sliding state correlation (used in connectivity_correlations.py)
    group_temporal_n_perm: 100  # Number of permutations for group temporal analysis (used in plotting/behavioral/group.py)
  # Advanced statistical options
  compute_bayes_factors: false  # Compute Bayes Factor for each correlation (JZS prior, BF>3 = moderate evidence)
  robust_correlation: null  # Robust correlation method: null (standard), "percentage_bend", "winsorized", "shepherd"
  loso_stability: false  # Compute leave-one-subject-out correlation stability check
  reliability_check: false  # Compute split-half reliability for correlations
  targets:  # Behavioral targets to correlate with EEG features
    - "pain_rating"  # Primary target: pain intensity rating
    - "temperature"  # Secondary target: stimulus temperature (dose-response)
    - "pain_binary"  # Binary pain classification
  pain_relevant_patterns:  # Regex patterns for pain-relevant feature selection (used in correlate_pain_relevant_features)
    - "^pow_alpha_(C3|C4|CP3|CP4|Cz)"
    - "^pow_theta_(Fz|FCz|F3|F4)"
    - "^pow_(loGamma|hiGamma)_(C3|C4|CP3|CP4)"
    - "^aper_(slope|offset)_"
    - "^wpli_(alpha|theta)_"
    - "^ms_(coverage|duration)_"
  predictors:  # Top predictor selection parameters
    top_n: 20  # Number of top predictors to display/export
  plotting:  # Plotting-specific thresholds and limits (used in behavioral correlation plots)
    top_n_features_default: 20  # Default number of top features to display in plots (used in correlate.py, summary.py)
    top_n_features_small: 10  # Small number of top features for compact displays (used in correlate.py:776)
    top_n_features_large: 30  # Large number of top features for detailed displays
    max_channels_per_plot: 10  # Maximum channels to display per plot before truncation (used in correlate.py)
  output_files:  # Standardized output file naming patterns (used in save_correlation_results)
    # Pattern: corr_stats_{analysis}_{level}_vs_{target}[_{method}].tsv
    # analysis: pow, conn, precomputed, microstates, itpc, pac, aperiodic, erds, etc.
    # level: roi, channel, edge, etc.
    # target: rating, temp
    # method: spearman, pearson (optional, omitted for default method)
    prefix: "corr_stats"  # File name prefix
    separator: "_"  # Field separator
    extension: ".tsv"  # File extension
    include_method_suffix: true  # Whether to append correlation method to filename
  group_aggregation:  # Group-level aggregation parameters (used in group_aggregation.py, aggregate_behavior.py)
    min_samples_for_stats: *min_samples_for_stats  # Minimum samples per subject for group statistics (reference to shared min_samples_for_stats)
    correlation_clip_low: *fisher_z_clip_min  # Lower clipping bound for correlations (prevents -1.0 for Fisher z-transform, reference to shared fisher_z_clip_min)
    correlation_clip_high: *fisher_z_clip_max  # Upper clipping bound for correlations (prevents 1.0 for Fisher z-transform, reference to shared fisher_z_clip_max)
    topomap_default_vmax: 0.5  # Default maximum value for topomap colorbar (used in plot_group_topomap)
    jitter_range: 0.2  # Jitter range for scatter plots (reduces overplotting)
    scatter_alpha: 0.6  # Transparency for group scatter plots
    scatter_size: 12  # Marker size for group scatter plots
  robust_statistics:  # Robust statistical methods for behavior analysis
    use_robust_correlation: false  # Use robust (outlier-resistant) correlation methods
    robust_method: "percentage_bend"  # Method: "percentage_bend", "winsorized", "shepherd"
    use_partial_correlation: false  # Control for covariates in correlations
    partial_covariates: []  # Covariates for partial correlation (e.g., ["age", "motion"])
    bootstrap_n_iterations: 5000  # Bootstrap iterations for confidence intervals
    bootstrap_ci_method: "BCa"  # CI method: "BCa" (bias-corrected accelerated) or "percentile"
    bootstrap_ci_level: 0.95  # Confidence interval level
  mixed_effects:  # Mixed-effects modeling for repeated measures
    enabled: false  # Use mixed-effects models for correlations
    random_effects: "intercept"  # Random effect structure: "intercept", "slope", "both"
    subject_column: "subject"  # Column name for subject grouping
    report_icc: true  # Report intraclass correlation coefficient
  mediation:  # Mediation analysis parameters
    enabled: false  # Run mediation analysis
    n_bootstrap: 5000  # Bootstrap iterations for indirect effect CI
    independent_variable: "temperature"  # X variable (stimulus)
    dependent_variable: "rating"  # Y variable (outcome)
    mediators: []  # List of feature columns to test as mediators

###################################################################
# GROUP AGGREGATION
###################################################################
feature_aggregation:  # Feature aggregation parameters (used in aggregate_features.py)
  power_bin: "plateau"  # Power bin label for feature aggregation (used in group/features.py)
  filenames:  # Output filenames for aggregated feature statistics (used in aggregate_features.py)
    microstate_transitions: "aggregated_microstate_transitions.tsv"  # Filename for microstate transition summary (used in aggregate_feature_stats)

###################################################################
# DECODING & MACHINE LEARNING
###################################################################
decoding:  # Decoding/regression analysis parameters (used in 05_decoding.py, decoding.py)
  cv:  # Cross-validation parameters (used in nested_loso_predictions, within_subject_kfold_predictions)
    inner_splits: 5  # Number of inner CV folds for hyperparameter tuning (used in _fit_with_inner_cv, create_inner_cv, permutation.py)
    min_trials_for_inner_cv: 3  # Minimum trials required to run inner CV (used in _fit_within_subject_fold)
    min_trials_for_within_subject: 2  # Minimum trials per subject for within-subject CV (used in create_within_subject_folds)
    default_n_splits: 5  # Default number of CV splits (used in create_stratified_cv_by_binned_targets, create_block_aware_cv_for_within_subject)
    default_n_bins: 5  # Default number of bins for stratified CV (used in create_stratified_cv_by_binned_targets, same value as default_n_splits for consistency)
  constants:  # Decoding constants (used in riemann_export_cov_bins, get_min_channels_required)
    min_channels_for_riemann_absolute: 8  # Absolute minimum channels required for Riemannian geometry methods
    percentile_low: 33.3  # Lower percentile for rating binning (low pain bin, used in riemann_export_cov_bins)
    percentile_high: 66.7  # Upper percentile for rating binning (high pain bin, used in riemann_export_cov_bins)
    min_trials_for_binning: 4  # Minimum trials required for rating binning
    min_trials_per_bin: 2  # Minimum trials required per bin after binning
    variance_threshold: 0.0  # Variance threshold for VarianceThreshold preprocessing (used in create_base_preprocessing_pipeline)
    min_variance_for_correlation: *epsilon_std  # Minimum variance threshold for correlation calculations (used in safe_pearsonr, reference to shared epsilon_std)
    min_variance_threshold: *epsilon_amp  # Minimum variance threshold for feature constant detection (used in permutation.py _is_feature_constant_within_blocks, reference to shared epsilon_amp)
    bca_ci_min_samples: 10  # Minimum samples required for BCA CI calculation (used in _bca_ci)
    bca_ci_min_jackknife: 3  # Minimum jackknife samples required for BCA CI calculation (used in _bca_ci)
    bootstrap_ci_alpha_low: 0.025  # Lower alpha for bootstrap confidence intervals (used in _bca_ci, corresponds to ci_percentile_low/100)
    bootstrap_ci_alpha_high: 0.975  # Upper alpha for bootstrap confidence intervals (used in _bca_ci, corresponds to ci_percentile_high/100)
  preprocessing:  # Preprocessing pipeline parameters (used in create_base_preprocessing_pipeline, create_elasticnet_pipeline, create_rf_pipeline)
    imputer_strategy: "median"  # Strategy for SimpleImputer (used in create_base_preprocessing_pipeline, create_rf_pipeline)
    power_transformer_method: "yeo-johnson"  # Method for PowerTransformer (used in create_elasticnet_pipeline)
    power_transformer_standardize: true  # Whether to standardize after PowerTransformer (used in create_elasticnet_pipeline)
    variance_threshold_grid: [0.0, 0.01, 0.1]  # Variance threshold grid for VarianceThreshold hyperparameter tuning (used in orchestration.py)
  models:  # Machine learning model hyperparameters (used in _setup_models_and_config)
    elasticnet:  # Elastic net regression parameters
      max_iter: 200000  # Maximum iterations for elastic net solver
      tol: 0.001  # Convergence tolerance for elastic net
      selection: "random"  # Feature selection method: "random" or "cyclic"
      alpha_grid: [0.001, 0.01, 0.1, 1, 10, 100]  # Regularization strength grid (L1+L2, used in _get_decoding_config)
      l1_ratio_grid: [0.2, 0.5, 0.8]  # L1/L2 mixing grid (0.2=more L2, 0.8=more L1, used in _get_decoding_config)
    random_forest:  # Random forest regression parameters
      n_estimators: 500  # Number of trees in forest
      bootstrap: true  # Whether to use bootstrap sampling
      max_depth_grid: [5, 10, 20, null]  # Maximum depth grid for hyperparameter tuning (used in build_rf_param_grid)
      min_samples_split_grid: [2, 5, 10]  # Minimum samples split grid for hyperparameter tuning (used in build_rf_param_grid)
      min_samples_leaf_grid: [1, 2, 4]  # Minimum samples leaf grid for hyperparameter tuning (used in build_rf_param_grid)
