  log_dir: null  # Log directory path (null = use default, used in get_subject_logger)
  file_names:  # Log filenames for each analysis step
    feature_engineering: "feature_extraction.log"  # Feature extraction log filename (used in pipelines/features.py)
    behavior_analysis: "behavioral_correlations.log"  # Behavioral analysis log filename (used in pipelines/behavior.py)

###################################################################
# SYSTEM & ENVIRONMENT
###################################################################
environment:  # Environment variable configuration (applied in _apply_thread_limits)
  thread_limits:  # Thread limits for numerical libraries (prevents oversubscription)
    OMP_NUM_THREADS: "1"  # OpenMP thread limit
    MKL_NUM_THREADS: "1"  # Intel MKL thread limit
    OPENBLAS_NUM_THREADS: "1"  # OpenBLAS thread limit
    NUMEXPR_NUM_THREADS: "1"  # NumExpr thread limit
