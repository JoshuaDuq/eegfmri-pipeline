###################################################################
# OUTPUT & LOGGING
###################################################################
output:  # Output configuration (used in io_utils.py, save_fig)
  log_file_name: "behavior_analysis.log"  # Default log filename
  fig_dpi: 300  # Figure DPI for output
  pad_inches: 0.02  # Padding around saved figures [inches]
  bbox_inches: "tight"  # Bounding box mode for saved figures
  tfr_footer_template: "tfr_baseline"  # Footer template name for TFR plots
  save_formats:  # File formats for saving figures
    - "svg"  # SVG format (vector graphics)

logging:  # Logging configuration
  file_names:  # Log filenames for each analysis step
    feature_engineering: "03_feature_extraction.log"  # Feature extraction log filename
    time_frequency: "02_tfr_analysis.log"  # TFR analysis log filename
    behavior_analysis: "04_behavioral_correlations.log"  # Behavioral analysis log filename

###################################################################
# SYSTEM & ENVIRONMENT
###################################################################
analysis:  # Analysis pipeline configuration
  strict_mode: true  # Whether to enforce strict validation (fail on errors vs warnings)
  min_subjects_for_group: 2  # Minimum subjects required for group-level analysis (used in nested_loso_predictions)
  min_subjects_for_topomaps: 3  # Minimum subjects required for group topomaps
  data_quality:  # Data quality thresholds
    max_nan_fraction: 0.1  # Maximum fraction of NaN values allowed (0.1 = 10%)

random:  # Random number generation configuration
  seed: 42  # Random seed for reproducibility (used in permutation tests, CV splits, ML models)

environment:  # Environment variable configuration (applied in _apply_thread_limits)
  thread_limits:  # Thread limits for numerical libraries (prevents oversubscription)
    OMP_NUM_THREADS: "1"  # OpenMP thread limit
    MKL_NUM_THREADS: "1"  # Intel MKL thread limit
    OPENBLAS_NUM_THREADS: "1"  # OpenBLAS thread limit
    NUMEXPR_NUM_THREADS: "1"  # NumExpr thread limit
