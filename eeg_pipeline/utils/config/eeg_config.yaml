###################################################################
# 1. PROJECT & PATHS
###################################################################
project:
  task: "task"  # Task name used in BIDS paths and file naming
  random_state: 42  # Primary random seed for reproducible analyses
  subject_list: null  # Optional list of subjects to process (null = all found)

paths:
  bids_root: "../../../data/bids_output/eeg"  # BIDS-formatted EEG data directory
  bids_fmri_root: "../../../data/bids_output/fmri"  # BIDS-formatted fMRI data directory (for contrast builder)
  deriv_root: "../../../data/derivatives"  # Processed derivatives output directory
  source_data: "../../../data/source_data"  # Raw source data directory
  freesurfer_dir: "../../../data/derivatives/freesurfer"  # FreeSurfer SUBJECTS_DIR (contains subject directories)
  freesurfer_license: null  # Path to FreeSurfer license.txt (otherwise use EEG_PIPELINE_FREESURFER_LICENSE, then ~/license.txt)

###################################################################
# 1b. fMRI PREPROCESSING (fMRIPrep-style)
###################################################################
fmri_preprocessing:
  engine: "docker"  # "docker" or "apptainer"
  fmriprep:
    image: "nipreps/fmriprep:25.2.4"  # Docker image tag or apptainer URI/path
    output_dir: null  # BIDS derivatives root (null = <deriv_root>/preprocessed/fmri)
    work_dir: null  # Scratch/work directory (null = <deriv_root>/work/fmriprep)
    fs_license_file: null  # FreeSurfer license.txt (null = paths.freesurfer_license, then EEG_PIPELINE_FREESURFER_LICENSE, then ~/license.txt)
    fs_subjects_dir: null  # Optional FreeSurfer SUBJECTS_DIR
    output_spaces: ["MNI152NLin2009cAsym", "T1w"]
    ignore: []  # e.g., ["fieldmaps", "slicetiming"]
    bids_filter_file: null  # Optional BIDS filter JSON (path)
    use_aroma: false
    skip_bids_validation: false
    clean_workdir: true
    stop_on_first_crash: false
    fs_no_reconall: false
    mem_mb: 0  # 0 = fMRIPrep default
    extra_args: ""  # Parsed with shlex and appended verbatim to fMRIPrep CLI

###################################################################
# 2. DEFINITIONS & ANCHORS
###################################################################

# 2.1 Frequency Bands
frequency_bands: &frequency_bands
  delta: [1.0, 3.9]
  theta: [4.0, 7.9]
  alpha: [8.0, 12.9]
  beta: [13.0, 30.0]
  gamma: [30.1, 80.0]

# 2.2 Time Windows
time_windows:
  active: &active_window [3.0, 10.5]  # Active/task period [s]
  baseline_tfr: &baseline_window_tfr [-5.0, -0.01]  # TFR baseline window [s]
  baseline_erp: [-0.2, 0.0]  # ERP baseline window [s]

# 2.3 Numeric Guards
numeric:
  epsilon_std: &epsilon_std 1e-12
  epsilon_psd: &epsilon_psd 1e-20
  epsilon_amp: &epsilon_amp 1e-10
  log_base: &log_base 10.0
  percentage_multiplier: &percentage_multiplier 100.0

# 2.4 ROI Regex Patterns
# NOTE: Laterality labels (Ipsi_L, Contra_R) assume LEFT-SIDE stimulation.
# If stimulation side varies, either:
#   1. Flip channel labels per-trial before feature extraction, OR
#   2. Use hemisphere-neutral ROI names (Left/Right instead of Ipsi/Contra)
# The current labels are valid ONLY for consistent left-side stimulation.
rois: &roi_definitions
  Frontal: ["^(Fp2|Fpz|AF3|AF7|AF8|F1|F2|F3|F5|F6|F7|F8)$"]
  Sensorimotor_Right: ["^(FC4|FC6|C2|C6|CP2|CP4|CP6)$"]
  Sensorimotor_Left: ["^(FC5|C1|C3|C5|CP3|CP5)$"]
  Temporal_Right: ["^(FT8|FT10|T8|TP8|TP10)$"]
  Temporal_Left: ["^(FT7|FT9|T7|TP7|TP9)$"]
  ParOccipital_Right: ["^(P2|P4|P6|P8|PO4|PO8|O2)$"]
  ParOccipital_Left: ["^(P1|P3|P5|P7|PO3|PO7|O1)$"]
  ParOccipital_Midline: ["^(Pz|POz|Oz)$"]

###################################################################
# 3. CORE PROCESSING PIPELINE
###################################################################
event_columns:
  predictor: ["stimulus_temp", "stimulus_temperature", "temp", "temperature"]
  outcome: ["vas_final_coded_rating", "vas_final_rating", "vas_rating", "pain_intensity", "pain_rating", "rating"]
  # Optional: restrict strict event validation to these logical groups.
  # Keep as ["rating"] for paradigm-agnostic use; add "temperature"/"binary_outcome"
  # when those analyses are required.
  required: ["rating"]
  temperature: ["stimulus_temp", "stimulus_temperature", "temp", "temperature"]
  rating: ["vas_final_coded_rating", "vas_final_rating", "vas_rating", "pain_intensity", "pain_rating", "rating"]
  binary_outcome: ["binary_outcome_coded", "binary_outcome", "pain"]

alignment:
  allow_misaligned_trim: false
  min_alignment_samples: 5
  # EEG↔fMRI: recommended for simultaneous acquisition
  trim_to_first_volume: true         # EEG raw_to_bids: trim to first volume marker
  fmri_onset_reference: "first_iti_start"  # fMRI raw_to_bids: event onsets relative to first ITI

eeg:
  montage: "easycap-M1"
  ch_types: "eeg"
  reference: "average"
  eog_channels: null
  ecg_channels: ["ECG"]

preprocessing:
  resample_freq: 500
  l_freq: 0.1
  h_freq: 100
  notch_freq: 60
  line_freq: 60
  n_jobs: 1
  find_breaks: true
  write_clean_events: true           # Write post-rejection (kept-epochs) *_proc-clean_events.tsv in derivatives
  clean_events_overwrite: true       # Overwrite existing clean events.tsv
  clean_events_strict: true          # Fail preprocessing if clean events.tsv cannot be written/aligned

pyprep:
  ransac: true
  repeats: 3
  average_reref: false
  file_extension: ".vhdr"
  consider_previous_bads: true
  overwrite_chans_tsv: true
  delete_breaks: false
  breaks_min_length: 20
  t_start_after_previous: 2
  t_stop_before_next: 2

ica:
  algorithm: "extended_infomax"
  method: "extended_infomax"
  n_components: 0.99
  l_freq: 1.0
  probability_threshold: 0.8
  labels_to_keep: ["brain", "other"]

epochs:
  # IMPORTANT: Keep epochs.tmin earlier than the earliest baseline time window.
  # With Morlet wavelets and low frequencies (e.g., 1 Hz with min_cycles=3),
  # baseline values near the epoch boundary are edge-affected and can bias
  # baseline-normalized power. This extra padding reduces that bias.
  tmin: -7.0
  tmax: 15.0
  # Use an ERP-appropriate baseline window. Per-feature baseline handling is preferable,
  # but when a global epoch baseline is applied, it should match the ERP convention.
  baseline: [-0.2, 0.0]
  # For long stimulus-locked epochs (-5..15s), fixed PTP thresholds are brittle and can
  # reject nearly all trials due to slow drift/residual artifacts. Prefer autoreject.
  reject: "autoreject_local"
  autoreject_n_interpolate: [4, 8, 16]

###################################################################
# 4. ANALYSIS PARAMETERS
###################################################################


# 4.2 Time-Frequency (TFR)
time_frequency_analysis:
  baseline_mode: "logratio"
  baseline_window: *baseline_window_tfr
  active_window: *active_window
  bands: *frequency_bands
  tfr:
    freq_min: 1.0
    freq_max: 100.0
    n_freqs: 40
    min_cycles: 3.0
    max_cycles: 15.0            # Cap to avoid extreme smoothing at high frequencies (gamma)
    n_cycles_factor: 2.0         # n_cycles = freq / n_cycles_factor
    decim_power: 4               # Decimation for power TFR (can be aggressive)
    decim_phase: 1               # Decimation for phase/complex TFR (preserve time structure)
    workers: -1
  rois: *roi_definitions
  
  topomap:
    temporal:
      single_subject:
        hspace: 0.15
        wspace: 0.8
      window_size_ms: 100.0  # Size of each time window in milliseconds (for fixed-size windows)
      window_count: 5        # Number of time windows (for fixed-count windows)
  
  constants:
    # Baseline processing
    epsilon_baseline: 1.0e-10
    min_epochs_for_tfr: 10
    min_baseline_samples: 10
    baseline_precision: 1.0e-6
    baseline_sentinel: "BASELINED:"
    min_log_value: 1.0e-12
    min_divisor: 1.0e-12
    mad_scaling_factor: 1.4826
    # Frequency resolution validation
    low_freq_threshold: 15.0
    low_cycles_warning_threshold: 4.0
    freq_threshold_for_time_res: 8.0
    # Statistics
    min_samples_for_stats: 5

# 4.3 Feature Extraction
feature_engineering:
  feature_categories: ["power", "connectivity", "aperiodic", "itpc", "pac", "complexity", "quality", "microstates", "erds", "spectral", "ratios", "asymmetry", "erp", "bursts"]
  spatial_modes: ["roi", "channels", "global"]
  # Controls cross-trial feature computation and leakage constraints:
  # - "group_stats": allow cross-trial estimates (one row per subject/condition as appropriate)
  # - "trial_ml_safe": forbid cross-trial features unless train_mask is provided (ML/CV-safe)
  analysis_mode: "trial_ml_safe"

  # Per-family spatial transforms: CSD is excellent for phase connectivity but changes
  # the meaning/units/topography of amplitude-derived features. Configure separately.
  # Options: "csd" (recommended for phase), "laplacian", or "none"
  spatial_transform_per_family:
    connectivity: "csd"      # Phase-based connectivity REQUIRES CSD for valid results
    itpc: "csd"              # Phase coherence also benefits from CSD
    pac: "csd"               # PAC phase component benefits from CSD
    power: "none"            # Amplitude features - CSD changes interpretation
    aperiodic: "none"        # Slope/offset - CSD changes spectral shape
    bursts: "none"           # Envelope-based - CSD changes amplitude
    erds: "none"             # Baseline-normalized power - CSD changes baseline
    complexity: "none"       # Nonlinear dynamics - CSD changes signal properties
    ratios: "none"           # Band ratios - CSD changes band power
    asymmetry: "none"        # Hemispheric asymmetry - CSD changes topography
    spectral: "none"         # Peak frequency etc - CSD changes spectral shape
    erp: "none"              # ERP waveforms - CSD changes amplitude/topography
    quality: "none"          # Quality metrics - should match raw data
    microstates: "none"      # Topographic maps; keep voltage-space interpretation
  spatial_transform_params:
    lambda2: 1.0e-5
    stiffness: 4.0
  # Global spatial transform override:
  # - "none": use per-family spatial_transform_per_family settings (recommended)
  # - "csd"/"laplacian": force this transform for ALL families (use with care)
  spatial_transform: "none"

  # Parallelization (per-module; -1 = all cores)
  parallel:
    n_jobs_bands: -1
    n_jobs_connectivity: -1
    n_jobs_itpc: -1
    n_jobs_aperiodic: -1
    n_jobs_complexity: -1

  # Shared intermediates
  precomputed:
    subtract_evoked: null  # null = inherit feature_engineering.power.subtract_evoked

  # Optional storage/extra outputs
  save_tfr_with_sidecar: false
  compute_change_scores: true
  change_scores:
    transform: "difference"          # "difference" | "percent" | "log_ratio"
    window_pairs:
      - ["baseline", "active"]

  power:
    require_baseline: true
    # For event-related pain paradigms, subtracting the evoked (ERP) component is often
    # scientifically preferable when interpreting oscillatory power changes as "induced".
    # In trial_ml_safe mode, provide ctx.train_mask to avoid CV leakage; otherwise this
    # is automatically disabled for safety.
    subtract_evoked: true
    min_trials_per_condition: 2
    # Line-noise control for TFR band-averaged power (independent of notch quality).
    # Defaults fall back to feature_engineering.spectral.* if unset.
    exclude_line_noise: true
    line_noise_freqs: [60.0]
    line_noise_width_hz: 1.0
    line_noise_harmonics: 3
    # Emit dB-scaled versions of log10-ratio power:
    #   db = 10 * log10(active / baseline)
    emit_db: true
  
  constants:
    epsilon_std: *epsilon_std
    epsilon_psd: *epsilon_psd
    epsilon_amp: *epsilon_amp
    min_epochs_for_features: 10
    min_channels_for_connectivity: 3
    min_samples_for_psd: 64
    min_valid_fraction: 0.5
    min_epochs_for_plv: 10
    min_edge_samples: 30
  
  # Feature validity thresholds shared across families
  features:
    min_baseline_power: 1.0e-12      # Clamp baseline power to avoid division instability
    min_valid_band_fraction: 0.0     # 0 disables trial dropping based on valid-band coverage

  # Optional PSD settings for shared PSD helpers. If empty, feature_engineering.spectral is used.
  psd: {}

  spectral:
    ratio_pairs:
      - [theta, beta]       
      - [theta, alpha]    
      - [alpha, beta]     
      - [delta, alpha]     
      - [delta, theta]      
    include_log_ratios: true
    # NOTE: Band ratios in this pipeline use PSD-integrated band power (power per Hz),
    # which is appropriate for cross-band ratios. For aperiodic-adjusted ratios,
    # use `*_powcorr` outputs from the aperiodic module.
    psd_method: "multitaper"         # "multitaper" (recommended) or "welch"
    psd_adaptive: false
    multitaper_adaptive: false
    fmin: 1.0
    fmax: 80.0
    exclude_line_noise: true
    line_noise_freqs: [60.0]         # Must match preprocessing.line_freq
    line_noise_width_hz: 1.0
    line_noise_harmonics: 3
    segments: ["baseline"]           # Restrict spectral/IAF to baseline by default; add "active" if needed
    min_segment_sec: 2.0             # Minimum segment duration for reliable PSD (sec)
    min_cycles_at_fmin: 3.0          # Require at least this many cycles at lowest freq in band

  band_envelope:
    # Padding reduces edge artifacts for bandpass+Hilbert envelopes/phases on epoched data.
    # Effective padding is max(pad_sec, pad_cycles / fmin).
    pad_sec: 0.5
    pad_cycles: 3.0

  # Optional individualized bands (IAF-based) derived from baseline PSD.
  bands:
    use_iaf: false
    alpha_width_hz: 2.0
    iaf_search_range_hz: [7.0, 13.0]
    iaf_min_prominence: 0.05
    iaf_min_cycles_at_fmin: 5.0     # Require this many cycles at iaf_search_range_hz[0] for stable PSD/peak detection
    iaf_min_baseline_sec: 0.0       # Additional absolute minimum baseline duration (sec); 0 disables
    allow_full_fallback: false      # If true and baseline is missing, use full segment (not recommended for pain paradigms)
    # Use existing ROI names from `rois:` above. If these ROIs are missing, IAF
    # estimation returns null unless allow_all_channels_fallback=true.
    iaf_rois: ["ParOccipital_Midline", "ParOccipital_Left", "ParOccipital_Right"]
    allow_all_channels_fallback: false

  itpc:
    # Leakage-safe modes:
    # - "fold_global": ITPC computed from TRAINING trials only when ctx.train_mask present (CV-safe, DEFAULT)
    # - "global": ITPC computed across ALL trials and broadcast per trial (LEAKS in CV/ML - use only for descriptive analysis)
    # - "condition": ITPC computed per condition group (avoids pseudo-replication for condition-level analyses)
    # - "loo": Leave-one-out ITPC (unsafe unless allow_unsafe_loo=true and computed in-fold)
    method: "fold_global"
    allow_unsafe_loo: false
    baseline_correction: "none"  # "none" or "subtract"
    # Condition-based ITPC settings (used when method="condition")
    # ITPC is fundamentally cross-trial; broadcasting it per trial creates pseudo-replication.
    # For condition-level analyses, compute ITPC within each condition group.
    condition_column: null        # Column name in events for condition grouping (e.g., "condition", "stimulus_type")
    condition_values: []          # Optional: values to INCLUDE (empty = all). Other values are excluded (rows set to NaN).
    min_trials_per_condition: 10  # Minimum trials per condition for reliable ITPC
    min_segment_sec: 1.0          # Minimum segment duration for ITPC (sec)
    min_cycles_at_fmin: 3.0       # Require at least this many cycles at lowest freq in band

  ratios:
    min_segment_sec: 1.0          # Minimum segment duration for band ratios (sec)
    min_cycles_at_fmin: 3.0       # Require at least this many cycles at lowest freq in band
    skip_invalid_segments: true   # Skip segments that don't meet validity criteria (vs NaN)

  asymmetry:
    channel_pairs:
      - ["F3", "F4"]
      - ["F7", "F8"]
      - ["C3", "C4"]
      - ["P3", "P4"]
      - ["O1", "O2"]
    min_segment_sec: 1.0          # Minimum segment duration for asymmetry (sec)
    min_cycles_at_fmin: 3.0       # Require at least this many cycles at lowest freq in band
    skip_invalid_segments: true   # Skip segments that don't meet validity criteria (vs NaN)
    emit_activation_convention: false  # Also emit (R-L)/(R+L) activation-style asymmetry for activation_bands
    activation_bands: ["alpha"]

  aperiodic:
    model: "fixed"                 # "fixed" or "knee"
    psd_method: "multitaper"       # "multitaper" (recommended) or "welch"
    psd_bandwidth: null
    multitaper_adaptive: false
    subtract_evoked: false         # Induced spectra (evoked subtraction; CV-safe only with train_mask)
    fmin: 1.0                      # Must cover lowest band (delta starts at 1.0 Hz)
    fmax: 80.0                     # Must cover highest band (gamma ends at 80.0 Hz)
    peak_rejection_z: 3.5
    min_r2: 0.6
    min_fit_points: 5
    max_rms: null
    min_segment_sec: 2.0           # Minimum segment duration for stable slope/offset estimation (sec)
    max_freq_resolution_hz: 1.0    # Skip segments if PSD frequency step is coarser than this
    exclude_line_noise: true       # Exclude line-noise bins before fitting
    line_noise_freqs: [60.0]       # Must match preprocessing.line_freq
    line_noise_width_hz: 1.0
    line_noise_harmonics: 3

  connectivity:
    measures: ["wpli", "aec"]
    output_level: "full"              # "full" or "global_only"
    mode: "cwt_morlet"                # mne-connectivity mode for phase measures
    aec_mode: "orth"
    aec_absolute: true
    aec_output: ["r"]                 # ["r"] (raw), ["z"] (Fisher-z), or ["r", "z"] (both); z averages correctly across trials/subjects
    enable_aec: true
    enable_graph_metrics: false
    graph_top_prop: 0.1
    small_world_n_rand: 100
    sliding_window_len: 1.0
    sliding_window_step: 0.5
    dynamic_enabled: false
    dynamic_measures: ["wpli", "aec"]   # Sliding-window dynamic metrics per edge/ROI
    dynamic_autocorr_lag: 1             # Lag (in windows) for temporal autocorrelation
    dynamic_min_windows: 3              # Minimum windows required to emit dynamic features
    dynamic_include_roi_pairs: true     # Also emit ROI-pair summaries (mean/std/autocorr)
    dynamic_state_enabled: true         # K-means connectivity state transitions
    dynamic_state_n_states: 3           # Number of connectivity states
    dynamic_state_min_windows: 8        # Minimum windows required for state metrics
    dynamic_state_random_state: null    # Optional seed for deterministic state clustering
    n_freqs_per_band: 8
    n_cycles: null
    decim: 1
    min_segment_samples: 50
    granularity: "trial"             # "trial", "condition", "subject"
    condition_column: null            # When granularity="condition": events.tsv column defining condition groups (null = auto-detect)
    condition_values: []              # Optional: values to INCLUDE. If set, other values are excluded (rows set to NaN).
    min_epochs_per_group: 5
    min_cycles_per_band: 3.0         # Minimum oscillatory cycles per band for reliable connectivity
    warn_if_no_spatial_transform: true  # Warn if phase-based measures used without CSD/Laplacian
    phase_estimator: "within_epoch"  # "within_epoch" (per-trial) or "across_epochs" (group-level, broadcast)
    force_within_epoch_for_ml: true  # Force within_epoch when train_mask detected (prevents CV leakage)
    min_segment_sec: 1.0             # Minimum segment duration for connectivity (sec)

  directedconnectivity:
    enable_psi: true
    enable_dtf: false
    enable_pdc: false
    output_level: "full"     # "full" | "global_only"
    mvar_order: 10
    min_samples_per_mvar_parameter: 10  # Auto-reduce order when short windows cannot support stable fits
    n_freqs: 16
    min_segment_samples: 100

  # Source localization (MNE-Python): cortical ROI power/envelope/connectivity from source estimates.
  #
  # Defaults use the FreeSurfer fsaverage template. For subject-specific (or fMRI-informed) localization,
  # you MUST provide:
  #   - subjects_dir: FreeSurfer SUBJECTS_DIR (folder containing the subject directory)
  #   - subject: FreeSurfer subject name (e.g., "sub-0001")
  #   - trans: EEG↔MRI transform file (*.fif) from MNE coregistration
  #   - bem: BEM solution file (*-bem-sol.fif)
  #
  # fMRI-informed mode does NOT use raw BOLD time-series directly. It requires an fMRI statistical map
  # (t/z/cope/contrast map) already computed by an fMRI GLM and resampled into the SAME MRI space as the
  # FreeSurfer subject (typically `mri/orig.mgz` space).
  #
  sourcelocalization:
    mode: "eeg_only"                    # "eeg_only" (template-based) or "fmri_informed" (subject-specific)
    method: "lcmv"                 # "lcmv" or "eloreta"
    spacing: "oct6"                # "oct5" | "oct6" | "ico4" | "ico5"
    parcellation: "aparc"          # "aparc" | "aparc.a2009s" | "HCPMMP1"
    connectivity_method: "aec"     # "aec" | "wpli" | "plv"
    mindist_mm: 5.0
    reg: 0.05                      # LCMV regularization
    snr: 3.0                       # eLORETA SNR
    loose: 0.2                     # eLORETA loose orientation (0..1)
    depth: 0.8                     # eLORETA depth weighting (0..1)
    subjects_dir: null             # e.g., "../../data/freesurfer"
    subject: null                  # e.g., "sub-0001"
    trans: null                    # e.g., "../../../data/derivatives/coreg/sub-0001-trans.fif"
    bem: null                      # e.g., "../../../data/derivatives/bem/sub-0001-bem-sol.fif"
    fmri:
      enabled: false
      stats_map_path: null         # NIfTI statistical map in the subject's FreeSurfer MRI space (e.g., orig.mgz space)
      provenance: "independent"    # "independent" (recommended) or "same_dataset" (circularity risk)
      require_provenance: true     # If true, error when provenance is unknown
      threshold: 3.1
      tail: "pos"                  # "pos" or "abs"
      threshold_mode: "z"          # "z" or "fdr"
      fdr_q: 0.05
      stat_type: "z"
      cluster_min_voxels: 50
      # Preferred: stable across voxel sizes/resampling. When set, overrides cluster_min_voxels.
      # Example: 50 vox @ 2mm isotropic ≈ 50 * 8 = 400 mm^3.
      cluster_min_volume_mm3: 400
      max_clusters: 20
      max_voxels_per_cluster: 2000
      max_total_voxels: 20000
      random_seed: 0
      output_space: "dual"         # "cluster" | "atlas" | "dual"
      # NOTE: fmri.time_windows is intentionally unsupported for source feature computation.
      contrast:
        enabled: false
        type: "t-test"             # "t-test" | "paired-t-test" | "f-test" | "custom"
        cond_a: {column: "trial_type", value: ""}
        cond_b: {column: "trial_type", value: ""}
        formula: ""
        name: "pain_vs_baseline"
        runs: []                   # explicit runs (empty = auto-detect)
        hrf_model: "spm"           # "spm" | "flobs" | "fir"
        drift_model: "cosine"      # "none" | "cosine" | "polynomial"
        high_pass_hz: 0.008
        low_pass_hz: null          # Optional; avoid unless you know you need it
        # Optional: restrict which event phases are modeled by the GLM (by events.tsv trial_type).
        # If null, all event rows are modeled (default). For multi-phase pain tasks, a practical choice is:
        #   ["stimulation", "pain_question", "vas_rating"]
        events_to_model: null
        # Optional: restrict which stimulation sub-phases are modeled when events.tsv includes 'stim_phase'.
        # If null, no stim_phase scoping is applied.
        # Use ["all"] to disable scoping and model all stimulation phases.
        stim_phases_to_model: null
        cluster_correction: true
        cluster_p_threshold: 0.001
        output_type: "z-score"     # "z-score" | "t-stat" | "cope" | "beta"
        resample_to_freesurfer: true

  pac:
    source: "precomputed"        # "precomputed" (Hilbert PAC, recommended) or "tfr" (wavelet PAC, prone to spurious coupling)
    method: "mvl"
    surrogate_method: "trial_shuffle"  # "trial_shuffle" (recommended) | "circular_shift"
    pairs: [["theta", "gamma"], ["alpha", "gamma"]]
    phase_range: [4.0, 8.0]
    amp_range: [30.0, 80.0]
    min_epochs: 2
    min_segment_sec: 1.0
    min_cycles_at_fmin: 3.0
    normalize: true
    n_surrogates: 0
    random_seed: null
    allow_harmonic_overlap: false
    max_harmonic: 6
    harmonic_tolerance_hz: 1.0
    # Emits low-frequency waveform non-sinusoidality diagnostics alongside PAC.
    # Useful for spotting spurious PAC driven by sharp transients/non-sinusoidal waveforms.
    compute_waveform_qc: true
    waveform_offset_ms: 5.0

  complexity:
    # Complexity can be computed on either the band-passed signal ("filtered") or its envelope.
    # "filtered" is more interpretable as oscillatory complexity; "envelope" targets amplitude dynamics.
    signal_basis: "filtered"         # "filtered" | "envelope"
    pe_order: 3
    pe_delay: 1
    sampen_order: 2                  # Sample entropy embedding dimension
    sampen_r: 0.2                    # Sample entropy tolerance as fraction of SD
    mse_scale_min: 1                 # MSE coarse-graining start scale
    mse_scale_max: 20                # MSE coarse-graining end scale
    zscore: true
    min_segment_sec: 2.0             # Minimum segment duration (sec)
    min_samples: 200                 # Minimum samples for stable LZC/PE/SampEn/MSE
    skip_invalid_segments: true

  output:
    save_subject_level_features: true
    also_save_csv: false

  erp:
    baseline_correction: true
    allow_no_baseline: false
    smooth_ms: 0.0
    peak_prominence_uv: null
    lowpass_hz: 30.0                 # Low-pass filter before ERP peak detection (standard practice)
    components:
      - name: "n1"
        start: 0.10
        end: 0.20
      - name: "n2"
        start: 0.20
        end: 0.35
      - name: "p2"
        start: 0.35
        end: 0.50

  bursts:
    bands: ["beta", "gamma"]
    threshold_method: "percentile"   # "percentile", "zscore", "mad"
    threshold_reference: "trial"     # "trial" (trialwise-valid), "subject" (cross-trial), or "condition" (cross-trial within condition)
    threshold_percentile: 95.0
    threshold_z: 2.0                # used for zscore/mad methods
    min_trials_per_condition: 10     # used when threshold_reference="condition"
    min_segment_sec: 2.0             # Minimum segment duration (sec) before attempting bursts
    skip_invalid_segments: true
    min_duration_ms: 50
    min_cycles: 3.0

  erds:
    use_log_ratio: false             # true = dB (10*log10), false = percent change
    min_baseline_power: 1.0e-12      # Clamp baseline power to avoid division instability
    min_active_power: 1.0e-12        # Clamp active power for log computation
    min_segment_sec: 0.5             # Minimum segment duration in seconds
    bands: ["alpha", "beta"]         # Bands for ERDS computation (subset of frequency_bands)
    # Pain-focused alpha markers (trial-level contralateral somatosensory kinetics)
    pain_marker_bands: ["alpha"]     # Bands where contralateral pain markers are extracted
    laterality_columns: ["stim_side", "stimulated_side", "pain_side", "side", "stimulus_side", "hand"]
    infer_contralateral_when_missing: true
    somatosensory_left_channels: ["C1", "C3", "C5", "CP1", "CP3", "CP5", "FC1", "FC3", "FC5"]
    somatosensory_right_channels: ["C2", "C4", "C6", "CP2", "CP4", "CP6", "FC2", "FC4", "FC6"]
    onset_threshold_sigma: 1.0       # Threshold crossing = sigma * baseline noise (%), with floor below
    onset_min_threshold_percent: 5.0 # Absolute minimum threshold for ERD onset (%)
    onset_min_duration_ms: 30.0      # Sustained crossing duration for onset detection
    rebound_threshold_sigma: 1.0     # Rebound threshold = sigma * baseline noise (%), with floor below
    rebound_min_threshold_percent: 5.0
    rebound_min_latency_ms: 100.0    # Search rebound after this delay from ERD peak

  quality:
    psd_method: "welch"              # "welch" or "multitaper"
    fmin: 1.0
    fmax: 100.0
    n_fft: 256
    exclude_line_noise: true
    line_noise_freqs: [60.0]         # Must match preprocessing.line_freq
    line_noise_width_hz: 1.0
    line_noise_harmonics: 3
    snr_signal_band: [1.0, 30.0]     # "Signal" band for SNR computation
    snr_noise_band: [40.0, 80.0]     # "Noise" band for SNR computation
    muscle_band: [30.0, 80.0]        # High-frequency band for muscle artifact detection

  microstates:
    n_states: 4
    min_peak_distance_ms: 10.0
    max_gfp_peaks_per_epoch: 400
    min_duration_ms: 20.0
    assign_from_gfp_peaks: true   # If true, assign states at GFP peaks then backfit sample-wise labels
    gfp_peak_prominence: 0.0
    random_state: 42

# 4.4 Behavioral Correlation
behavior_analysis:
  predictor_type: "continuous"  # "continuous" | "binary" | "categorical"
  # Canonical behavior columns used across stages. If empty, auto-resolve from
  # event_columns.* aliases and existing trial-table columns.
  predictor_column: ""   # e.g., stimulus intensity / dose / temperature
  outcome_column: ""     # e.g., rating / arousal / detection score
  predictor_control_enabled: true  # Partial-out predictor in correlations

  # Optional robust estimator for correlations:
  # - null/"none": standard Spearman/Pearson
  # - "percentage_bend" | "winsorized" | "shepherd"
  robust_correlation: null
  control_trial_order: true
  bootstrap: 1000
  n_jobs: -1
  # Optional overrides for feature selection (null = auto-discover all available)
  feature_files: null
  feature_categories: null

  # Optional run adjustment (subject-level): enable run-aware covariates / aggregation.
  # Set enabled=false for paradigms with no runs (trial-only designs).
  run_adjustment:
    enabled: false
    column: "run_id"                 # e.g., "run_id", "run", "block"
    include_in_correlations: true    # when enabled=true, add run dummies to partial correlations
    max_dummies: 20                  # fail if run dummy expansion would exceed this limit

  # Canonical per-trial table export (clean events.tsv + feature columns)
  trial_table:
    enabled: true
    format: "parquet"   # "parquet" (default, recommended) or "tsv"
    # If true, fail when feature/event alignment can only be verified by positional
    # row order (no shared event keys like epoch/trial_index available).
    disallow_positional_alignment: false

  # Trial order validation (used when control_trial_order=true)
  trial_order:
    max_missing_fraction: 0.1

  # Pain residual = rating - f(temperature) for "pain beyond stimulus intensity"
  predictor_residual:
    enabled: true
    method: "spline"          # "spline" (requires statsmodels) or "poly"
    min_samples: 10
    spline_df_candidates: [3, 4, 5]
    poly_degree: 2
    crossfit:
      enabled: true
      group_column: ""        # "" -> use behavior_analysis.run_adjustment.column
      n_splits: 5
      method: "spline"        # "spline" | "poly" (crossfit uses sklearn splines/poly + ridge)
      spline_n_knots: 5

  
  # Trialwise regression (complements correlations)
  regression:
    enabled: false
    primary_unit: "trial"            # "trial" | "run_mean"
    outcome: "outcome"               # "outcome" | "predictor_residual" | "predictor"
    include_predictor: true
    predictor_control: "linear"      # "linear" | "outcome_hat" | "spline"
    predictor_spline:
      n_knots: 4
      quantile_low: 0.05
      quantile_high: 0.95
      min_samples: 12
    include_trial_order: true
    include_prev_terms: false      # uses prev_/delta_ columns from trial table
    include_run_block: true
    include_interaction: true      # feature × temperature
    standardize: true
    min_samples: 15
    n_permutations: 0
    max_features: null

  # Single-subject report (non-gating; summarizes outputs and diagnostics)
  report:
    enabled: true
    top_n: 15

  validation:
    enabled: true
  
  # Output options
  output:
    also_save_csv: false
    overwrite: true
  
  # Permutation testing configuration
  permutation:
    # Permutation scheme for trialwise inference.
    # - "circular_shift": preserves within-run autocorrelation (recommended for pain paradigms)
    # - "shuffle": simple exchangeability within groups (faster, less realistic)
    scheme: "circular_shift"
    # Group column preference for within-group permutation
    # Order matters: first available column is used
    # Default: block → run → session (more conservative for within-subject tests)
    group_column_preference: ["block", "run_id", "run", "session", "subject"]
  
  # Statistics
  statistics:
    correlation_method: "spearman"
    fdr_alpha: 0.05
    n_permutations: 1000
    compute_reliability: false
    default_n_bootstrap: 1000
    base_seed: 42
    hierarchical_fdr: true
    # Temperature control used in partial correlations / permutation tests for correlations.
    # "spline" uses a restricted cubic spline basis (linear regression on nonlinear terms).
    predictor_control: "spline"  # "linear" | "spline"
    # If false, trial-level tests require permutation or aggregation.
    # Set true only if you explicitly accept i.i.d. trial assumptions.
    allow_iid_trials: false

  # Feature validity gates (prevents pseudo-replication)
  features:
    exclude_non_trialwise_features: true  # Drop broadcast/cross-trial features when primary_unit="trial"
  
  # Correlations computation
  correlations:
    enabled: true
    types: ["partial_cov_predictor"]
    target_column: ""                 # Empty = auto-resolve from event_columns.outcome
    power_segment_preference: ""      # Empty = default/auto segment selection
    targets: ["rating", "temperature", "predictor_residual"]
    compute_change_scores: true
    loso_stability: true
    compute_bayes_factors: false
    prefer_predictor_residual: true
    use_crossfit_predictor_residual: true
    primary_unit: "trial"            # "trial" | "run_mean"
    min_runs: 5                      # Minimum run count when primary_unit="run_mean"
    p_primary_mode: "perm_if_available"  # "asymptotic" | "perm_if_available"
    permutation:
      enabled: true
      n_permutations: 1000
  
  # Condition comparison computation
  condition:
    enabled: true
    fail_fast: true
    effect_size_threshold: 0.5  # Minimum Cohen's d to report
    compare_column: ""          # Column to split by (empty = use event_columns.binary_outcome)
    compare_values: []           # Explicit values to compare. Leave empty only for binary columns with exactly 2 observed levels.
    compare_labels: null         # Optional labels for compare_values (same length)
    primary_unit: "run_mean"       # "trial" | "run_mean" (run_mean avoids pseudo-replication)
    overwrite: true
    p_primary_mode: "perm_if_available"   # "asymptotic" | "perm_if_available"
    permutation:
      enabled: true
      n_permutations: 1000
  
  # Temporal correlations computation  
  temporal:
    enabled: true
    target_column: ""                 # Empty = use event_columns.rating
    time_resolution_ms: 50
    time_range_ms: [-200, 1000]
    smooth_window_ms: 100
    correction_method: "cluster"      # "fdr" | "bonferroni" | "cluster"
    # Condition-based splitting (similar to condition comparison)
    split_by_condition: true           # If true, compute separate correlations per condition value
    condition_column: ""               # Column to split by (empty = use event_columns.binary_outcome)
    condition_values: []               # Specific values to compute for (empty = all unique values in column)
    # Output options for unified temporal correlations file
    include_roi_averages: true         # Include ROI-averaged rows (replaces power_topomap_correlations)
    include_tf_grid: true              # Include individual frequency rows (replaces corr_stats_tf_*)
    # Feature selection for temporal correlations
    features:
      power: true                      # Power (spectral power in bands) - default, already implemented
      itpc: false                      # Inter-trial phase coherence - phase locking strength
      erds: false                      # Event-related desynchronization/synchronization
    # ITPC-specific parameters
    itpc:
      baseline_correction: true        # Subtract baseline ITPC
      baseline_window: [-0.5, -0.01]   # Baseline window for ITPC normalization
    # ERDS-specific parameters
    erds:
      baseline_window: [-0.5, -0.1]    # Baseline window for ERDS (seconds)
      method: "percent"                # ERDS computation method: "percent" or "zscore"
  
  # Cluster permutation tests
  cluster:
    enabled: false
    n_permutations: 1000
    forming_threshold: 0.05
    min_cluster_size: 2
    tail: 0  # 0=two-tailed, 1=upper, -1=lower
    condition_column: ""         # Column to split by (empty = use event_columns.binary_outcome)
    condition_values: []         # Exactly 2 values to compare (default [0, 1] if empty)

  cluster_correction:
    enabled: false
    n_permutations: 1000
    alpha: 0.05
    forming_threshold: 0.05
    min_cluster_size: 2
    tail: 0
  
  # Group-level analysis controls
  group_level:
    block_permutation: true
    multilevel_correlations:
      target: "outcome"
      control_predictor: false
      control_trial_order: false
      control_run_effects: false
      max_run_dummies: 20
  
  min_samples:
    channel: 10
    roi: 20
    default: 5
    edge: 15
  feature_registry:
    files:
      power: "features_power.parquet"
      connectivity: "features_connectivity.parquet"
      aperiodic: "features_aperiodic.parquet"
      erp: "features_erp.parquet"
      bursts: "features_bursts.parquet"
      itpc: "features_itpc.parquet"
      pac: "features_pac_trials.parquet"
      complexity: "features_complexity.parquet"
      quality: "features_quality.parquet"
      microstates: "features_microstates.parquet"
      erds: "features_erds.parquet"
      spectral: "features_spectral.parquet"
      ratios: "features_ratios.parquet"
      asymmetry: "features_asymmetry.parquet"
    source_to_feature_type:
      power: "power"
      connectivity: "connectivity"
      aperiodic: "aperiodic"
      erp: "erp"
      bursts: "bursts"
      itpc: "itpc"
      pac: "pac"
      complexity: "complexity"
      quality: "quality"
      microstates: "microstates"
      erds: "erds"
      spectral: "spectral"
      ratios: "ratios"
      asymmetry: "asymmetry"
    feature_type_hierarchy:
      power:
        subtypes: ["baseline", "ramp", "active", "change", "roi", "global"]
      connectivity:
        subtypes: ["roi", "graph", "edge", "baseline", "active"]
      aperiodic:
        subtypes: ["slope", "offset"]
      spectral:
        subtypes: ["peak", "edge", "iaf"]
      erp:
        subtypes: ["n1", "p2", "n2", "p3", "ptp"]
      itpc:
        subtypes: ["baseline", "ramp", "active", "time"]
      pac:
        subtypes: ["trial", "time"]
      complexity:
        subtypes: ["lzc", "pe", "hjorth"]
      quality:
        subtypes: ["snr", "artifact"]
      microstates:
        subtypes: ["coverage", "duration", "occurrence", "trans"]
      erds:
        subtypes: ["percent", "db", "slope"]
      ratios:
        subtypes: ["ratio"]
      asymmetry:
        subtypes: ["hemisphere", "roi"]
      bursts:
        subtypes: ["rate", "duration", "amplitude"]
    feature_patterns:
      erds: "^erds_([^_]+)_ch_([^_]+)_.+$"
      band_ratio: "^ratio_([^_]+)_([^_]+)_ch_([^_]+)_.+$"
      hjorth: "^hjorth_([^_]+)_([^_]+)$"
      roi_power: "^power_([^_]+)_roi_([^_]+)_.+$"
      roi_asymmetry: "^asym_([^_]+)_([^_]+)_.+$"
      itpc: "^itpc_([^_]+)_ch_([^_]+)_([^_]+)_.+$"
      aperiodic: "^aperiodic_([^_]+)_ch_([^_]+)_.+$"
      powcorr: "^powcorr_([^_]+)_([^_]+)$"
      conn_graph: "^conn_graph_([^_]+)_([^_]+)_([^_]+)$"
      gfp: "^gfp_([^_]+)$"
      microstates: "^microstates_([^_]+)_broadband_global_.+$"
      power_segmented: "^power_([^_]+)_([^_]+)_ch_([^_]+)_.+$"
      connectivity_segmented: "^conn_([^_]+)_([^_]+)_([^_]+)_chpair_([^_]+)_.+$"
      itpc_segmented: "^itpc_([^_]+)_ch_([^_]+)_([^_]+)_.+$"
      dynamics_burst_segmented: "^bursts_([^_]+)_([^_]+)_([^_]+)_.+$"

# 4.5 Machine Learning
machine_learning:
  # Data loading for ML:
  # - Feature tables come from the feature extraction pipeline (derivatives/.../eeg/features/*/features_*.parquet)
  # - Targets/covariates come from the *clean* events.tsv (derivatives/.../eeg/*_proc-clean_events.tsv when available)
  data:
    feature_set: "combined"              # "combined" | "power" | "connectivity" | "aperiodic" | "itpc" | "erp" | "channels_mean"
    feature_families: null               # Used when feature_set="combined" (null = load all standard families; override via CLI: --feature-families ...)
    feature_bands: null                  # Optional restriction (NamingSchema band), e.g. ["alpha", "beta"]
    feature_segments: null               # Optional restriction (NamingSchema segment), e.g. ["baseline", "active"]
    feature_scopes: null                 # Optional restriction (NamingSchema scope), e.g. ["global", "roi", "chpair"]
    feature_stats: null                  # Optional restriction (NamingSchema stat), e.g. ["wpli", "aec"] for connectivity
    feature_harmonization: "intersection"  # "intersection" | "union_impute"
    feature_files: {}                    # Optional overrides per family: { power: "features_power.parquet", ... }
    covariates: []                       # Optional extra predictors appended to X (meta names: temperature, trial_index, block, ...)
    covariates_strict: false             # If true, error when requested covariates are missing
    require_trial_ml_safe: true          # If true, error unless feature_engineering.analysis_mode="trial_ml_safe"
    max_excluded_subject_fraction: 0.25  # Fail ML matrix build if excluded subjects exceed this fraction of requested subjects

  # Targets can be logical names ('rating', 'temperature', 'binary_outcome') or explicit events.tsv column names.
  targets:
    regression: "rating"
    classification: "binary_outcome"
    binary_threshold: null               # Required when classifying a continuous target (e.g., rating > 30)
    strict_regression_target_continuous: false  # If true, error when regression target is binary-like (prefer ml classify)

  incremental_validity:
    baseline_predictors: ["temperature"] # Standardized meta names: temperature, trial_index, block
    require_baseline_predictors: true    # If true, missing baseline predictors raise an error instead of intercept-only fallback
    baseline_alpha: 1.0

  cv:
    inner_splits: 5
    hygiene_enabled: true
    within_subject_ordered_blocks: true  # If true, within-subject CV uses forward block splits when block labels are ordered.
    permutation_scheme: "within_subject_within_block"  # "within_subject" | "within_subject_within_block"
    min_label_shuffle_fraction: 0.01     # Minimum fraction of labels that must change for a permutation to be considered effective
    min_valid_permutation_fraction: 0.5  # Minimum completed/requested permutations required for valid p-values
    default_n_splits: 5
    default_n_bins: 5

  evaluation:
    ci_method: "bootstrap"               # "fixed_effects" | "bootstrap"
    bootstrap_iterations: 1000
    subject_weighting: "equal"           # "equal" (recommended inferential unit = subject) | "trial_count"

  constants:
    variance_threshold: 0.0
    min_variance_for_correlation: 1e-10

  preprocessing:
    imputer_strategy: "median"
    variance_threshold_grid: [0.0, 0.01, 0.1]
    power_transformer_method: "yeo-johnson"
    power_transformer_standardize: true
    deconfound: false                      # Regress covariates out of EEG features before classification
    spatial_regions_allowed: []            # List of ROI names to keep (e.g., ["frontal", "parietal"]); empty = all
    feature_selection_percentile: 100.0    # Percentage of features to keep (e.g. 10.0 for top 10%); 100.0 = keep all
    pca:
      enabled: false
      n_components: 0.95
      whiten: false
      svd_solver: "auto"
      random_state: null

  classification:
    model: "svm"                         # "svm" | "lr" | "rf" | "cnn"
    min_subjects_with_auc_for_inference: 2  # Require at least this many subjects with defined held-out AUC
    max_failed_fold_fraction: 0.25       # Abort classification if failed folds exceed this fraction of total folds
    calibrate_ensemble: false            # Calibrate SVM/RF probability outputs using CalibratedClassifierCV
    resampler: "none"                    # "none" | "undersample" | "smote"
    resampler_seed: 42                   # Random seed for resampling

  interpretability:
    grouped_outputs: true                # Write band/ROI grouped importance tables when available
  analysis:
    time_generalization:
      min_subjects_per_cell: 2           # Require at least this many held-out subjects with finite cell scores
      min_valid_permutation_fraction: 0.8  # Minimum valid permutations required for TG inferential outputs
  models:
    elasticnet:
      alpha_grid: [0.001, 0.01, 0.1, 1, 10]
      l1_ratio_grid: [0.2, 0.5, 0.8]
    ridge:
      alpha_grid: [0.01, 0.1, 1.0, 10.0, 100.0]
    random_forest:
      n_estimators: 500
      max_depth_grid: [5, 10, 20, null]
      min_samples_split_grid: [2, 5, 10]
      min_samples_leaf_grid: [1, 2, 4]
      bootstrap: true
      class_weight: "balanced"
    svm:
      kernel: "rbf"
      C_grid: [0.1, 1.0, 10.0]
      gamma_grid: ["scale", "auto"]
      class_weight: "balanced"
    logistic_regression:
      penalty: "l2"
      C_grid: [0.01, 0.1, 1.0, 10.0]
      max_iter: 1000
      class_weight: "balanced"
    cnn:
      temporal_filters: 8
      depth_multiplier: 2
      pointwise_filters: 16
      kernel_length: 64
      separable_kernel_length: 16
      dropout: 0.5
      batch_size: 64
      max_epochs: 75
      patience: 10
      learning_rate: 0.001
      weight_decay: 0.001
      val_fraction: 0.2
      gradient_clip_norm: 1.0
      use_cuda: false

###################################################################
# 5. STATISTICS & VALIDATION
###################################################################
statistics:
  alpha: &default_alpha 0.05
  sig_alpha: *default_alpha
  fdr_alpha: *default_alpha
  n_permutations: 1000
  n_bootstrap: 1000
  
  constants:
    fisher_z_clip_min: -0.999999
    fisher_z_clip_max: 0.999999
    min_samples_for_stats: 2
    min_samples_per_covariate: 5
    partial_corr_base_samples: 5
    min_dof_for_correlation: 2
    log_base: *log_base
    percentage_multiplier: *percentage_multiplier

cluster_correction:
  enabled: false
  n_permutations: 1000
  forming_threshold: *default_alpha

validation:
  min_epochs: 20
  min_channels: 10
  max_amplitude_uv: 500

###################################################################
# 6. VISUALIZATION & PLOTTING
###################################################################

# Shared Visualization Settings
visualization:
  band_colors: &band_colors
    delta: "#4169e1"  # Royal Blue
    theta: "purple"
    alpha: "green"
    beta: "orange"
    gamma: "red"
  robust_vlim:
    q_low: 0.01
    q_high: 0.99
    cap: 0.25
  
  footer_templates:
    behavior: "Method: {method} | FDR α={fdr_alpha:.2f}"
    preprocessing: "Pipeline: {pipeline} | Reference: {reference}"

# New Orchestrated Plotting Config
plotting:
  defaults:
    dpi: 300
    savefig_dpi: 600
    formats: ["png", "svg"]
    bbox_inches: "tight"
    pad_inches: 0.02
    font:
      family: "sans-serif"
      weight: "normal"
      sizes:
        small: 7
        medium: 8
        large: 9
        title: 10
        annotation: 4
        label: 8
        ylabel: 10
        suptitle: 11
        figure_title: 12
    layout:
      tight_rect: [0, 0.03, 1, 1]

  figure_sizes:
    standard: [10.0, 8.0]
    medium: [9.0, 6.0]
    small: [7.2, 5.4]
    square: [3.5, 3.5]
    wide: [6.0, 2.5]
    tfr: [10.0, 10.0]
    topomap: [7.0, 7.0]

  styling:
    colors:
      condition_1: "navy"
      condition_2: "crimson"
      significant: "#C42847"
      nonsignificant: "#666666"
      gray: "#555555"
      light_gray: "#999999"
      black: "k"
      blue: "#1f77b4"
      red: "#d62728"
    alpha:
      grid: 0.3
      fill: 0.6
      ci: 0.1
      text_box: 0.8
    line:
      width:
        standard: 0.75
        bold: 1.5
        thin: 0.5
        thick: 1.0

  comparisons:
    # Comparison modes for paired plots
    compare_windows: true            # Window-based comparison (e.g., baseline vs active)
    compare_columns: true           # Column-based comparison (e.g., condition A vs condition B)
    
    # For window comparison: specify exactly 2 segment names to compare
    comparison_windows: ["baseline", "active"]
    
    # For column comparison: specify the segment, column name, and values
    comparison_segment: "active"     # Segment to use for column comparison (must match a named time window)
    comparison_column: ""            # Column name in events.tsv for comparisons (required when compare_columns is enabled)
    comparison_values: [0, 1]        # Values to compare (exactly 2; may be strings or numbers)
    comparison_labels: []            # Optional display labels (exactly 2; defaults to stringified values)
    
    comparison_rois: []              # ROIs to include (empty = all available)

  # Plotting-specific TFR settings (do not affect analysis computation)
  tfr: {}

  plots:
    topomap:
      contours: 6
      colormap: "RdBu_r"
      colorbar_fraction: 0.05
      colorbar_pad: 0.05
      diff_annotation_enabled: true
      annotate_descriptive: false
      sig_mask_params:
        marker: "o"
        markerfacecolor: "none"
        markeredgecolor: "g"
        linewidth: 0.8
        markersize: 3
    tfr:
      log_base: *log_base
      percentage_multiplier: *percentage_multiplier
      topomap:
        label_x_position: 0.5
        label_y_position_bottom: 1.08
        label_y_position: 1.02
        title_y: 1.04
        title_pad: 4
        subplots_right: 0.75
        default_diff_abs: 0.0
    power:
      width_per_band: 3.5
      height_per_segment: 4.0
    itpc:
      width_per_bin: 4.5
      height_per_band: 4.0
      width_per_band_box: 4.0
      height_box: 5.0
      shared_colorbar: true
    pac:
      cmap: "magma"
      width_per_roi: 4.0
      height_box: 5.0
    aperiodic:
      width_per_column: 5.0
      height_per_row: 4.5
    complexity:
      width_per_measure: 4.5
      height_per_segment: 4.0
    features:
      spectral:
        metrics: ["peak_freq", "center_freq", "bandwidth", "entropy", "peak_power", "logratio_mean", "logratio_std", "slope"]
      asymmetry:
        stat: "index"
      bursts:
        metrics: ["rate", "count", "duration_mean", "amp_mean", "fraction"]
      pac_pairs: ["theta_beta", "theta_gamma", "alpha_beta", "alpha_gamma"]

###################################################################
# 7. SYSTEM
###################################################################
system:
  n_jobs: -1
  strict_mode: true

io:
  constants:
    temperature_range: [35.0, 55.0]
    max_missing_channels_fraction: 0.5
