# EEG Pipeline Configuration
# Focused on clarity, reproducibility, and scientific rigor.

###################################################################
# PROJECT & PATHS
###################################################################
project:
  root: "."  # Project root directory (resolved relative to config file)
  task: "thermalactive"  # Task name used in BIDS paths and file naming
  random_state: 42  # Random seed for reproducible analyses (used in decoding, ML models)
  subjects:  # List of subject IDs (without 'sub-' prefix) for batch processing
    - "0000"
    - "0001"
  bids_root: "data/bids_output"  # BIDS-formatted data directory
  source_root: "data/source_data"  # Raw source data directory

paths:
  project_root: "."  # Base project directory path
  bids_root: "../../data/bids_output"  # BIDS dataset root (resolved relative to config)
  deriv_root: "../../data/derivatives"  # Processed derivatives output directory
  source_data: "../../data/source_data"  # Raw source data directory

###################################################################
# DATA STRUCTURE & DEFINITIONS
###################################################################
event_columns:  # Column name candidates searched in event/metadata DataFrames (first match used)
  temperature:  # Thermal stimulus temperature column names (used in pick_event_columns, extract_temperature_data)
    - "stimulus_temp"
    - "stimulus_temperature"
    - "temp"
    - "temperature"
  rating:  # Pain rating/VAS column names (used in pick_event_columns, resolve_columns)
    - "vas_final_coded_rating"
    - "vas_final_rating"
    - "vas_rating"
    - "pain_intensity"
    - "pain_rating"
    - "rating"
  pain_binary:  # Binary pain classification column names (used in ERP analysis, pick_event_columns)
    - "pain_binary_coded"
    - "pain_binary"
    - "pain"

alignment:  # Epoch-event alignment parameters
  allow_misaligned_trim: false  # Whether to allow trimming misaligned epochs (used in data loading)
  min_alignment_samples: 5  # Maximum tolerable mismatch (diff) for trimming when allow_misaligned_trim=True. Mismatches <= this value will be trimmed; larger mismatches will error.

frequency_bands: &frequency_bands  # Standard EEG frequency band definitions [Hz] (used throughout TFR/feature analysis)
  delta: [1.0, 3.9]  # Delta band range
  theta: [4.0, 7.9]  # Theta band range
  alpha: [8.0, 12.9]  # Alpha band range
  beta: [13.0, 30.0]  # Beta band range
  gamma: [30.1, 80.0]  # Gamma band range

rois: &roi_definitions  # Region of interest definitions: regex patterns matching channel names
  Frontal:  # Prefrontal + frontal (bilateral)
    - "^(Fp1|Fp2|Fpz|AF3|AF4|AF7|AF8|F1|F2|F3|F4|F5|F6|F7|F8)$"

  Sensorimotor_Contra_R:  # Right (contralateral) peri-Rolandic for left-forearm pain
    - "^(FC2|FC4|FC6|C2|C4|C6|CP2|CP4|CP6)$"

  Sensorimotor_Ipsi_L:  # Left (ipsilateral) peri-Rolandic
    - "^(FC1|FC3|FC5|C1|C3|C5|CP1|CP3|CP5)$"

  Temporal_Contra_R:  # Right temporal/S2-ish
    - "^(FT8|FT10|T8|TP8|TP10)$"

  Temporal_Ipsi_L:  # Left temporal/S2-ish
    - "^(FT7|FT9|T7|TP7|TP9)$"

  ParOccipital_Contra_R:  # Right posterior (parietal–occipital)
    - "^(P2|P4|P6|P8|PO4|PO8|O2)$"

  ParOccipital_Ipsi_L:  # Left posterior (parietal–occipital)
    - "^(P1|P3|P5|P7|PO3|PO7|O1)$"

  ParOccipital_Midline:  # Midline posterior
    - "^(Pz|POz|Oz)$"

  Midline_ACC_MCC:  # Midline cingulate/medial sensorimotor approximation
    - "^(Fz|Cz|CPz)$"


###################################################################
# DATA PROCESSING
###################################################################
raw_to_bids:  # Raw data to BIDS conversion parameters
  default_montage: "easycap-M1"  # Default MNE montage name for channel positions
  default_line_freq: 60.0  # Line noise frequency [Hz] for notch filtering

io:  # I/O utility constants
  constants:  # Column name lists used in _find_column_unified, find_column_in_events
    temperature_column_names:  # Temperature column candidates for I/O operations
      - "stimulus_temp"
      - "temperature"
      - "thermode_temperature"
    pain_column_names:  # Pain binary column candidates for I/O operations
      - "pain_binary_coded"
      - "pain_binary"
      - "pain"
    percent_threshold: 5.0  # Threshold for detecting percent format data (used in detect_data_format)
    max_channels_to_display: 10  # Maximum channels to display in channel lists (used in format_channel_list_for_display)
    temperature_min: 35.0  # Minimum valid temperature [°C] (used in validate_temperature_values)
    temperature_max: 55.0  # Maximum valid temperature [°C] (used in validate_temperature_values)
    max_missing_fraction: 0.5  # Maximum fraction of missing channels allowed for interpolation (used in align_epochs_to_pivot_chs)

###################################################################
# ANALYSIS PARAMETERS
###################################################################
foundational_analysis:  # Foundational ERP analysis parameters (used in 01_erp_analysis.py)
  erp:  # Event-related potential analysis settings
    picks: "eeg"  # Channel type selector for MNE (used in _extract_erp_config)
    combine: "gfp"  # Channel combination method: "gfp" (global field power) or "mean" (used in ERP plotting)
    include_tmax_in_crop: false  # Whether to include tmax endpoint in epoch cropping (used in _prepare_epochs_for_erp)
    default_crop_tmin: null  # Default epoch start time [s] (null = use full epoch)
    default_crop_tmax: null  # Default epoch end time [s] (null = use full epoch)
    pain_color: "crimson"  # Color for pain condition in ERP plots (used in _extract_erp_config)
    nonpain_color: "navy"  # Color for non-pain condition in ERP plots (used in _extract_erp_config)
    plots_subdir: "01_erp_analysis"  # Subdirectory name for ERP plots
    counts_file_name: "counts_pain.tsv"  # Filename for trial count statistics
    baseline_window: [-0.2, 0.0]  # ERP baseline correction window [s] relative to stimulus onset
    output_files:  # ERP plot output filenames
      pain_gfp: "erp_pain_binary_gfp.svg"  # Pain/non-pain GFP comparison plot
      pain_butterfly: "erp_pain_binary_butterfly.svg"  # Pain/non-pain butterfly plot (all channels)
      temp_gfp: "erp_by_temperature_gfp.svg"  # Temperature-stratified GFP plot
      temp_butterfly: "erp_by_temperature_butterfly.svg"  # Temperature-stratified butterfly plot
      temp_butterfly_template: "erp_by_temperature_butterfly_{label}.svg"  # Template for temperature-specific plots
  topomap_windows:  # Topographic map temporal window definitions
    pain_nonpain_temporal:  # Pain vs non-pain temporal topomaps
      window_count: 5  # Number of time windows to create
    pain_nonpain_temporal_allbands:  # Pain vs non-pain temporal topomaps across bands
      window_size_ms: 100.0  # Window size [ms] for temporal binning
    pain_nonpain_temporal_diff_allbands:  # Difference maps (pain - non-pain) across bands
      window_size_ms: 100.0  # Window size [ms] for temporal binning
    temporal_allbands_plateau:  # Plateau period temporal topomaps
      window_count: 5  # Number of time windows during plateau period
    group_pain_nonpain_temporal_diff_allbands:  # Group-level difference maps
      window_size_ms: 100.0  # Window size [ms] for temporal binning
    group_temporal_allbands_plateau:  # Group-level plateau temporal topomaps
      window_count: 5  # Number of time windows during plateau period

time_frequency_analysis:  # Time-frequency analysis parameters (used in 02_tfr_analysis.py, 03_feature_extraction.py)
  baseline_window: [-5.0, -0.01]  # TFR baseline correction window [s] relative to stimulus (used in apply_baseline_safe, validate_baseline_window_pre_stimulus)
  plateau_window: [3.0, 10.5]  # Thermal plateau period [s] for feature extraction (used in feature extraction, ML alignment)
  bands: *frequency_bands  # Frequency band definitions (reference to frequency_bands anchor)
  tfr: &tfr_defaults  # Time-frequency representation parameters (used in compute_tfr, compute_adaptive_n_cycles)
    freq_min: 1.0  # Minimum frequency [Hz] for TFR computation (logspace start)
    freq_max: 100.0  # Maximum frequency [Hz] for TFR computation (logspace end)
    n_freqs: 40  # Number of frequency bins (logarithmically spaced)
    n_cycles_factor: 2.0  # Multiplier for adaptive cycle calculation: n_cycles = freq / factor (used in compute_adaptive_n_cycles)
    min_cycles: 3.0  # Minimum wavelet cycles (prevents too few cycles at low frequencies)
    min_cycles_check: 2.0  # Threshold for low-cycle warnings [cycles]
    decim: 4  # Temporal decimation factor (downsampling: 1=no decim, 4=1/4 samples)
    picks: "eeg"  # Channel type selector for MNE TFR computation
    time_res_threshold_low_freq: 5.0  # Time resolution threshold [ms] for low frequencies (quality check)
    time_res_threshold_high_freq: 2.0  # Time resolution threshold [ms] for high frequencies (quality check)
  constants:  # TFR processing constants (used in tfr_utils.py)
    baseline_sentinel: "BASELINED:"  # String marker in TFR comment indicating baseline correction applied
    min_log_value: 1e-20  # Minimum value for log10 operations (prevents log(0))
    min_divisor: 1e-12  # Minimum divisor for division operations (prevents division by zero)
    min_samples_for_stats: 2  # Minimum samples required for statistical tests
    default_min_cycles: 3.0  # Default minimum wavelet cycles
    default_min_cycles_check: 2.0  # Default threshold for cycle count warnings
    low_freq_threshold: 8.0  # Frequency threshold [Hz] below which cycles are checked (used in log_tfr_resolution)
    low_cycles_warning_threshold: 2.5  # Cycle count threshold triggering warnings for low frequencies
    freq_threshold_for_time_res: 2.0  # Frequency threshold [Hz] for time resolution checks
    default_time_res_threshold_low_freq: 5.0  # Default time resolution threshold [ms] for low frequencies
    default_time_res_threshold_high_freq: 2.0  # Default time resolution threshold [ms] for high frequencies
    default_cycles_factor: 2.0  # Default cycles factor for adaptive cycle calculation
    mad_scaling_factor: 1.4826  # Median absolute deviation scaling (converts MAD to SD: MAD * 1.4826 ≈ SD)
  rois: *roi_definitions  # ROI definitions (reference to roi_definitions anchor)
  min_baseline_samples: 5  # Minimum samples required in baseline window (used in validate_baseline_indices)

tfr_topography_pipeline:  # TFR topography analysis pipeline parameters (used in 02_tfr_analysis.py)
  baseline_window: [-5.0, -0.01]  # Baseline window [s] for topography pipeline (used in _extract_tfr_config)
  plateau_window: [3.0, 10.5]  # Plateau window [s] for topography analysis (used in _extract_tfr_config)
  min_baseline_samples: 5  # Minimum samples in baseline window (used in validate_baseline_indices)
  temperature_strategy: "pooled"  # Temperature grouping strategy: "pooled" (all temps) or "stratified" (by temp)
  bands: *frequency_bands  # Frequency band definitions (reference to frequency_bands anchor)
  tfr:  # TFR computation parameters (inherits from tfr_defaults anchor)
    <<: *tfr_defaults  # Merge tfr_defaults parameters
    workers: -1  # Number of parallel workers for TFR computation (-1 = all CPUs, used in compute_tfr)

feature_engineering:  # Feature extraction parameters (used in 03_feature_extraction.py)
  enable_plots: true  # Whether to generate feature extraction plots
  save_tfr_with_sidecar: true  # Whether to save TFR files with BIDS sidecar JSON metadata
  features:  # Feature extraction window definitions
    plateau_start: 3.0  # Start time [s] of thermal plateau period for feature extraction
    plateau_end: 10.5  # End time [s] of thermal plateau period for feature extraction
    temporal_bins:  # Temporal bins for time-resolved feature extraction (used in extract_features)
      - start: 3.0  # Early plateau bin start [s]
        end: 5.0  # Early plateau bin end [s]
        label: "early"  # Bin label
      - start: 5.0  # Mid plateau bin start [s]
        end: 7.5  # Mid plateau bin end [s]
        label: "mid"  # Bin label
      - start: 7.5  # Late plateau bin start [s]
        end: 10.5  # Late plateau bin end [s]
        label: "late"  # Bin label
  tfr_processing:  # TFR processing parameters for feature extraction
    baseline_mode: "logratio"  # Baseline correction mode: "logratio" (log10(power/baseline)) or "percent" or "zscore"
  microstates:  # EEG microstate extraction parameters (used in extract_microstate_features)
    n_states: 4  # Number of microstate clusters to extract
    min_peak_distance_ms: 20.0  # Minimum distance [ms] between GFP peaks for microstate segmentation
    peaks_per_epoch: 5  # Number of GFP peaks to extract per epoch
    use_fixed_templates: false  # Use per-subject clustering unless templates are supplied
    use_group_templates: true  # If true, attempt to load group-level templates before per-subject clustering
    build_group_templates: true  # If true, aggregate subject templates into a group template (requires multiple subjects processed)
  aperiodic:  # Aperiodic component extraction parameters (used in extract_aperiodic_features)
    psd_window: [-5.0, -0.01]  # Time window [s] for PSD computation (must be pre-stimulus, ≤ 0)
    peak_rejection_z: 3.5  # Z-score threshold for robust peak rejection during aperiodic fitting
    min_fit_points: 5  # Minimum frequency points required for valid aperiodic fit
    min_samples: 5  # Minimum time samples required in PSD window
  constants:  # Feature extraction constants
    epsilon_std: 1e-12  # Small epsilon for standard deviation calculations (prevents division by zero)
    epsilon_psd: 1e-20  # Small epsilon for power spectral density calculations (prevents log(0))
    ascii_uppercase_a: 65  # ASCII code for 'A' (used in microstate labeling)
    min_correlation_samples: 5  # Minimum samples required for correlation calculations
    kmeans_n_init: 20  # Number of k-means initializations for microstate clustering
    aperiodic_fmin: 2.0  # Minimum frequency [Hz] for aperiodic component fitting
    aperiodic_fmax: 40.0  # Maximum frequency [Hz] for aperiodic component fitting
    pac_epsilon_amp: 1e-9  # Small epsilon for PAC amplitude normalization
  connectivity:  # Connectivity feature parameters
    sliding_window_len: 1.0  # Sliding window length [s] during plateau for dynamic connectivity
    sliding_window_step: 0.5  # Sliding window step [s]

pac_analysis:  # Phase-amplitude coupling parameters
  phase_range: [4.0, 8.0]  # Phase-frequency range [Hz] (e.g., theta)
  amp_range: [30.0, 80.0]  # Amplitude-frequency range [Hz] (e.g., gamma)
  phase_step_hz: 1.0  # Step size for phase frequencies [Hz]
  amp_step_hz: 5.0  # Step size for amplitude frequencies [Hz]
  plateau_window: [3.0, 10.5]  # Time window [s] to compute PAC (defaults to TFR plateau if unset)

features:  # Feature extraction band selection
  frequency_bands:  # Frequency bands to extract features for (used in feature extraction, behavior analysis)
    - "delta"
    - "theta"
    - "alpha"
    - "beta"
    - "gamma"

power:  # Power analysis band selection
  bands_to_use:  # Frequency bands for power analysis (used in _prepare_tfr_with_baseline, power feature extraction)
    - "delta"
    - "theta"
    - "alpha"
    - "beta"
    - "gamma"

behavior_analysis:  # Behavioral correlation analysis parameters (used in 04_behavioral_correlations.py, behavior.py)
  time_frequency_heatmap:  # Time-frequency correlation heatmap parameters (used in correlate_power_topomaps)
    time_resolution: 0.1  # Temporal bin size [s] for heatmap
    freq_resolution: 2.0  # Frequency bin size [Hz] for heatmap
    time_window: [0.0, 10.5]  # Time window [s] for heatmap analysis
    freq_range: [1.0, 80.0]  # Frequency range [Hz] for heatmap analysis
    alpha: 0.05  # Significance threshold for heatmap
    roi_selection: null  # ROI to restrict analysis to (null = all channels)
    n_cycles_factor: 2.0  # Cycles factor for TFR computation in heatmap
    decim: 4  # Temporal decimation factor for heatmap TFR
    n_cluster_perm: 10  # Number of cluster permutation tests (quick check)
  cluster_correction:  # Cluster-based permutation test parameters (used in cluster correction)
    alpha: 0.05  # Cluster significance threshold
    n_permutations: 1024  # Number of permutations for cluster correction
    rng_seed: 42  # Random seed for permutation tests
  temporal_correlation_topomaps:  # Temporal correlation topomap parameters (used in compute_temporal_correlations_by_condition)
    window_size_ms: 500.0  # Window size [ms] for temporal binning
    min_trials_per_condition: 5  # Minimum trials required per condition (temperature/pain) for correlation computation
  statistics:  # Statistical analysis parameters (used in _compute_correlation_statistics, compute_power_roi_stats)
    correlation_method: "spearman"  # Correlation method: "spearman" (rank) or "pearson" (linear)
    fdr_alpha: 0.05  # False discovery rate threshold (Benjamini-Hochberg correction, used in apply_global_fdr)
    n_permutations: 1024  # Number of permutation tests (used in compute_permutation_pvalues, ROI stats, topomap correlations)
    partial_covariates: ["temperature", "block"]  # Covariates for partial correlation (e.g., ["temperature", "block"])
    bootstrap_ci_percentiles: [2.5, 97.5]  # Bootstrap confidence interval percentiles (used in compute_bootstrap_ci)
    min_nodes_for_heatmap: 3  # Minimum nodes/channels required for heatmap computation
    min_channels_for_adjacency: 2  # Minimum channels required for adjacency matrix construction
    min_samples_roi: 5  # Minimum samples required for ROI-level statistics (used in _compute_roi_correlation_stats)
    min_samples_channel: 10  # Minimum samples required for channel-level statistics
    connectivity_min_correlation: 0.3  # Minimum correlation threshold for connectivity correlations (used in compute_connectivity_correlations)
    connectivity_max_pvalue: 0.05  # Maximum p-value threshold for connectivity correlations (used in compute_connectivity_correlations)
  predictors:  # Top predictor selection parameters
    top_n: 20  # Number of top predictors to display/export
  group_aggregation:  # Group-level aggregation parameters (used in group_aggregation.py, aggregate_behavior.py)
    min_samples_for_stats: 2  # Minimum samples per subject for group statistics
    correlation_clip_low: -0.999999  # Lower clipping bound for correlations (prevents -1.0 for Fisher z-transform)
    correlation_clip_high: 0.999999  # Upper clipping bound for correlations (prevents 1.0 for Fisher z-transform)
    ci_multiplier: 1.96  # Multiplier for 95% CI (1.96 = 1.96 * SE)
    topomap_default_vmax: 0.5  # Default maximum value for topomap colorbar
    jitter_range: 0.2  # Jitter range for scatter plots (reduces overplotting)
    scatter_alpha: 0.6  # Transparency for group scatter plots
    scatter_size: 12  # Marker size for group scatter plots
    summary_grouping_columns: ["target", "band", "roi"]  # Columns to group by for summary statistics (used in aggregate_behavior.py)
    output_dir: "group/eeg/stats"  # Output directory relative to deriv_root (used in aggregate_behavior.py)
    filenames:  # Output filenames for aggregated behavior statistics (used in aggregate_behavior.py)
      combined_correlations: "group_behavior_correlations.tsv"  # Filename for combined correlation statistics
      fdr_corrected: "group_behavior_correlations_fdr.tsv"  # Filename for FDR-corrected correlations
      summary: "group_behavior_summary.tsv"  # Filename for group summary statistics
      significant_predictors: "group_significant_predictors.tsv"  # Filename for significant predictors

feature_aggregation:  # Feature aggregation parameters (used in aggregate_features.py)
  input_filenames:  # Input feature filenames (used in aggregate_features.py)
    power: "features_eeg_plateau.tsv"  # Power feature filename
    microstates: "features_microstates.tsv"  # Microstate feature filename
    connectivity: "features_connectivity.tsv"  # Connectivity feature filename
  output_dir: "group/eeg/stats"  # Output directory relative to deriv_root (used in aggregate_features.py)
  filenames:  # Output filenames for aggregated feature statistics (used in aggregate_features.py)
    power_summary: "group_power_summary.tsv"  # Filename for power summary statistics
    microstate_summary: "group_microstate_summary.tsv"  # Filename for microstate summary statistics
    connectivity_summary: "group_connectivity_summary.tsv"  # Filename for connectivity summary statistics

decoding:  # Decoding/regression analysis parameters (used in 05_decoding.py, decoding.py)
  cv:  # Cross-validation parameters (used in nested_loso_predictions, within_subject_kfold_predictions)
    inner_splits: 5  # Number of inner CV folds for hyperparameter tuning (used in _fit_with_inner_cv, create_inner_cv)
    min_trials_for_inner_cv: 3  # Minimum trials required to run inner CV (used in _fit_within_subject_fold)
    min_trials_for_within_subject: 2  # Minimum trials per subject for within-subject CV (used in create_within_subject_folds)
    default_n_splits: 5  # Default number of CV splits (used in create_stratified_cv_by_binned_targets, create_block_aware_cv_for_within_subject)
    default_n_bins: 5  # Default number of bins for stratified CV (used in create_stratified_cv_by_binned_targets)
  constants:  # Decoding constants (used in riemann_export_cov_bins, get_min_channels_required)
    min_channels_for_riemann_absolute: 8  # Absolute minimum channels required for Riemannian geometry methods
    percentile_low: 33.3  # Lower percentile for rating binning (low pain bin, used in riemann_export_cov_bins)
    percentile_high: 66.7  # Upper percentile for rating binning (high pain bin, used in riemann_export_cov_bins)
    min_trials_for_binning: 4  # Minimum trials required for rating binning
    min_trials_per_bin: 2  # Minimum trials required per bin after binning
    variance_threshold: 0.0  # Variance threshold for VarianceThreshold preprocessing (used in create_base_preprocessing_pipeline)
    min_variance_for_correlation: 1e-12  # Minimum variance threshold for correlation calculations (used in safe_pearsonr)
    bca_ci_min_samples: 10  # Minimum samples required for BCA CI calculation (used in _bca_ci)
    bca_ci_min_jackknife: 3  # Minimum jackknife samples required for BCA CI calculation (used in _bca_ci)
    bootstrap_ci_alpha_low: 0.025  # Lower alpha for bootstrap confidence intervals (used in _bca_ci)
    bootstrap_ci_alpha_high: 0.975  # Upper alpha for bootstrap confidence intervals (used in _bca_ci)
  preprocessing:  # Preprocessing pipeline parameters (used in create_base_preprocessing_pipeline, create_elasticnet_pipeline, create_rf_pipeline)
    imputer_strategy: "median"  # Strategy for SimpleImputer (used in create_base_preprocessing_pipeline, create_rf_pipeline)
    power_transformer_method: "yeo-johnson"  # Method for PowerTransformer (used in create_elasticnet_pipeline)
    power_transformer_standardize: true  # Whether to standardize after PowerTransformer (used in create_elasticnet_pipeline)
  models:  # Machine learning model hyperparameters (used in _setup_models_and_config)
    elasticnet:  # Elastic net regression parameters
      max_iter: 200000  # Maximum iterations for elastic net solver
      tol: 0.001  # Convergence tolerance for elastic net
      selection: "random"  # Feature selection method: "random" or "cyclic"
      grid:  # Hyperparameter grid for GridSearchCV
        alpha: [0.001, 0.01, 0.1, 1, 10, 100]  # Regularization strength (L1+L2)
        l1_ratio: [0.2, 0.5, 0.8]  # L1/L2 mixing (0.2=more L2, 0.8=more L1)
    random_forest:  # Random forest regression parameters
      n_estimators: 500  # Number of trees in forest
      estimator_n_jobs: -1  # Number of parallel jobs for tree construction (-1 = all CPUs)
      bootstrap: true  # Whether to use bootstrap sampling
      grid:  # Hyperparameter grid for GridSearchCV
        max_depth: [null, 8, 16, 32]  # Maximum tree depth (null = unlimited)
        max_features: ["sqrt", 0.2, 0.5, 1.0]  # Features per split ("sqrt" = sqrt(n_features))
        min_samples_leaf: [1, 5, 10]  # Minimum samples per leaf node
    temperature_only:  # Temperature-only baseline model parameters
      ridge_alpha_grid: [0.0, 0.001, 0.01, 0.1, 1, 10]  # Ridge regression alpha grid
      ridge_alpha_default: 1.0  # Default ridge alpha if grid search fails
  analysis:  # Decoding analysis parameters
    n_perm_quick: 1024  # Number of permutations for quick permutation tests
    n_perm_refit: 1024  # Number of permutations for refitted model permutation tests
    perm_refit_n_jobs: 1  # Number of parallel jobs for permutation refitting
    perm_refit_use_nested_cv: false  # Whether to use nested CV in permutation refitting
    rf_perm_importance_repeats: 20  # Number of repeats for random forest permutation importance
    bootstrap_n: 1000  # Number of bootstrap samples for confidence intervals
    top_n_features: 20  # Number of top features to report/visualize
    riemann:  # Riemannian geometry decoding parameters (used in run_riemann_band_limited_decoding, run_riemann_sliding_window)
      plateau_window: [3.0, 10.5]  # Time window [s] for Riemannian covariance extraction (used in riemann_export_cov_bins)
      min_channels_for_fold: 32  # Minimum channels required per CV fold for Riemannian methods
      bands:  # Frequency bands for band-limited Riemannian analysis [Hz]
        - [1.0, 4.0]  # Delta band
        - [4.0, 8.0]  # Theta band
        - [8.0, 13.0]  # Alpha band
        - [13.0, 30.0]  # Beta band
        - [30.0, 45.0]  # Low gamma band
      sliding_window:  # Sliding window parameters for time-resolved Riemannian analysis
        window_len: 0.75  # Window length [s] for sliding window (used in run_riemann_sliding_window)
        step: 0.25  # Step size [s] between windows (used in run_riemann_sliding_window)
  paths:  # Decoding output paths
    results_subdir: "decoding"  # Subdirectory for decoding results
    plots_subdir: "plots"  # Subdirectory for decoding plots
  flags:  # Feature flags for decoding pipeline
    run_within_subject_kfold: true  # Whether to run within-subject KFold analysis
    run_riemann: true  # Whether to run Riemannian geometry analysis
    run_shap: true  # Whether to compute SHAP values for feature importance

###################################################################
# STATISTICAL ANALYSIS
###################################################################
statistics:  # Statistical analysis parameters (used in stats_utils.py)
  use_spearman_default: true  # Default to Spearman (rank) correlation instead of Pearson
  sig_alpha: 0.05  # Significance threshold for statistical tests
  fdr_alpha: 0.05  # False discovery rate threshold (Benjamini-Hochberg correction)
