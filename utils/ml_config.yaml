###################################################################
# Machine Learning Configuration
# EEG to fMRI Signature Prediction Pipeline
###################################################################

###################################################################
# General Settings
###################################################################

general:
  random_state: 42
  n_jobs: -1
  device: "auto"
  target_signature: "nps"
  include_temperature: false
  subjects: null
  output_root: null

###################################################################
# Data Configuration
###################################################################

data:
  bands:
    - "delta"
    - "theta"
    - "alpha"
    - "beta"
    - "gamma"
  supported_bands:
    - "delta"
    - "theta"
    - "alpha"
    - "beta"
    - "gamma"
  default_bands:
    - "delta"
    - "theta"
    - "alpha"
    - "beta"
    - "gamma"
  feature_selection:
    zero_variance_tol: 1e-12
    variance_threshold_tol: 1e-12
  imputation:
    strategy: "median"
  scaling:
    with_mean: true
    with_std: true

###################################################################
# Target Signatures
###################################################################

target_signatures:
  nps:
    key: "nps"
    display_name: "Neurologic Pain Signature (NPS)"
    short_name: "NPS"
    score_column: "nps_score"
    description: "Trial-wise Neurologic Pain Signature beta values derived from fMRI."
  siips1:
    key: "siips1"
    display_name: "Stimulus Intensity Independent Pain Signature (SIIPS1)"
    short_name: "SIIPS1"
    score_column: "siips1_score"
    description: "Trial-wise SIIPS1 beta values capturing expectancy-related pain modulation."
  vas_rating:
    key: "vas_rating"
    display_name: "Visual Analog Scale (VAS) Rating"
    short_name: "VAS"
    score_column: "vas_rating"
    description: "Trial-wise Visual Analog Scale pain ratings from behavioral responses."
  default: "nps"

###################################################################
# Cross-Validation Settings
###################################################################

cross_validation:
  outer:
    strategy: "auto"
    n_splits: null
    group_level: "subject"
    min_groups: 2
  inner:
    strategy: "auto"
    n_splits: 5
    group_level: "run"
  temperature_coverage:
    enforce: true
    check_train: true
    check_validation: true
  high_dimensionality_threshold: 0.1

###################################################################
# Baseline Models (ElasticNet, Random Forest)
###################################################################

baseline:
  models:
    - "elasticnet"
    - "random_forest"
  elasticnet:
    max_iter: 5000
    param_grid:
      alpha: [0.001, 0.01, 0.1, 1.0, 10.0]
      l1_ratio: [0.1, 0.3, 0.5, 0.7, 0.9]
    high_dimensionality_adjustments:
      alpha: [30.0, 100.0]
      l1_ratio: [0.95]
  random_forest:
    n_estimators: 600
    bootstrap: true
    param_grid:
      max_depth: [null, 12, 20]
      max_features: ["sqrt", "log2", 0.3]
      min_samples_leaf: [1, 2, 4]
    high_dimensionality_adjustments:
      max_features: [0.1]
      min_samples_leaf: [6, 10]

###################################################################
# SVM RBF Model
###################################################################

svm_rbf:
  cache_size: 200.0
  kernel: "rbf"
  param_grid:
    C: [0.1, 1.0, 10.0, 100.0]
    gamma: ["scale", 0.001, 0.01, 0.1]
    epsilon: [0.01, 0.1, 0.5]

###################################################################
# Covariance Model
###################################################################

covariance:
  models:
    - "elasticnet"
    - "ridge"
  tangent_space:
    metric: "riemann"
    epsilon: 1e-6
  elasticnet:
    max_iter: 5000
    param_grid:
      alpha: [0.001, 0.01, 0.1, 1.0]
      l1_ratio: [0.1, 0.3, 0.5, 0.7, 0.9]
  ridge:
    param_grid:
      alpha: [0.1, 1.0, 10.0, 100.0]

###################################################################
# CNN Model
###################################################################

cnn:
  conv_channels_grid: [16, 32]
  kernel_size_grid: [3, 5]
  hidden_dim_grid: [128]
  dropout_grid: [0.1, 0.3]
  learning_rate_grid: [1e-3]
  weight_decay_grid: [0.0, 1e-4]
  batch_size_grid: [32]
  max_epochs: 200
  patience: 20
  grad_clip: null
  lr_scheduler:
    factor: 0.5
    patience: 5
    min_lr: 1e-6
  monitor_min_samples: 16
  verbose: false
  preprocessing:
    zero_variance_tol: 1e-12
    imputation_strategy: "median"

###################################################################
# CNN-Transformer Model
###################################################################

cnn_transformer:
  conv_channels_grid: [32, 64]
  kernel_size_grid: [3, 5, 7]
  transformer_dim_grid: [64, 128]
  num_heads_grid: [4, 8]
  num_layers_grid: [2, 3]
  ff_multiplier_grid: [2, 4]
  dropout_grid: [0.1, 0.2, 0.3]
  learning_rate_grid: [1e-4, 5e-4, 1e-3]
  weight_decay_grid: [1e-5, 1e-4]
  batch_size_grid: [16, 32]
  max_epochs: 200
  patience: 25
  grad_clip: null
  lr_scheduler:
    factor: 0.5
    patience: 5
    min_lr: 1e-6
  verbose: false
  preprocessing:
    zero_variance_tol: 1e-12
    imputation_strategy: "median"

###################################################################
# Graph Neural Network Model
###################################################################

graph:
  graph_construction:
    radius: 0.0
    k_nearest: 5
    sigma: 0.1
    functional_threshold: 0.3
    montage: "standard_1020"
  node_features:
    feature_dim: null
  hidden_dim_grid: [64, 96]
  num_layers_grid: [2, 3]
  dropout_grid: [0.2, 0.4]
  global_dim_grid: [16, 32]
  learning_rate_grid: [5e-4, 1e-3]
  weight_decay_grid: [1e-4, 5e-4]
  batch_size_grid: [16, 32]
  max_epochs: 200
  patience: 25
  grad_clip: null
  lr_scheduler:
    factor: 0.5
    patience: 5
    min_lr: 1e-6
  verbose: false
  preprocessing:
    zero_variance_tol: 1e-12
    imputation_strategy: "median"

###################################################################
# Permutation Testing
###################################################################

permutation:
  enabled: false
  count: 0
  seed: null

###################################################################
# Training Settings (Deep Models)
###################################################################

training:
  validation:
    fraction: 0.2
    min_samples: 5
    stratify_by_temperature: true
    group_by_subject: true
  early_stopping:
    enabled: true
    monitor: "val_loss"
    mode: "min"
  optimization:
    optimizer: "adam"
    loss: "mse"
  cuda:
    deterministic: true
    benchmark: false

###################################################################
# Evaluation Metrics
###################################################################

metrics:
  regression:
    - "r2"
    - "mae"
    - "mse"
    - "rmse"
    - "explained_variance"
    - "pearsonr"
    - "spearmanr"
  group_by:
    - "subject"
    - "temp_celsius"
  temperature_baseline:
    enabled: true

###################################################################
# Output Configuration
###################################################################

output:
  base_dir: "machine_learning/outputs"
  timestamp_format: "%Y%m%d_%H%M%S"
  save:
    predictions: true
    per_subject_metrics: true
    per_temperature_metrics: true
    fold_details: true
    best_params: true
    feature_importance: true
    final_model: true
    permutation_results: true
  file_formats:
    predictions: "tsv"
    metrics: "json"
    model: "joblib"

###################################################################
# Plotting Configuration
###################################################################

plotting:
  style: "paper"
  log_level: "INFO"
  outputs_dir: "outputs"
  pattern: null
  advanced_diagnostics:
    enabled: true
    plots:
      - "prediction_intervals"
      - "bland_altman"
      - "prediction_density"
      - "error_vs_covariates"
      - "subject_scatter"
      - "error_by_subject"
      - "learning_curve"
  figure:
    dpi: 300
    format: "png"
    constrained_layout: true

###################################################################
# Paths and Directories
###################################################################

paths:
  eeg_derivatives: "eeg_pipeline/bids_output/derivatives"
  fmri_outputs:
    nps:
      - "fmri_pipeline/NPS/outputs"
      - "fmri_pipeline/NPS/data_percent_signal_false/outputs"
    siips1:
      - "fmri_pipeline/NPS/outputs"
      - "fmri_pipeline/NPS/data_percent_signal_false/outputs"
      - "fmri_pipeline/SIIPS1/outputs"
    vas_rating:
      - "fmri_pipeline/NPS/outputs"
      - "fmri_pipeline/NPS/data_percent_signal_false/outputs"
      - "fmri_pipeline/SIIPS1/outputs"
  eeg_config: "eeg_pipeline/utils/eeg_config.yaml"

###################################################################
# Orchestrator Settings
###################################################################

orchestrator:
  models:
    - "baseline"
    - "svm_rbf"
    - "covariance"
    - "cnn"
    - "cnn_transformer"
    - "graph"
  dry_run: false
  comparison:
    enabled: true
    metrics_table: "comparison_metrics.tsv"
    summary_file: "comparison_summary.json"

###################################################################
# Quality Control
###################################################################

quality_control:
  feature_to_sample_ratio_warning: 0.1
  grid_size_warning_multiplier: 5
  validate_target:
    check_nan: true
    check_inf: true
  validate_features:
    check_nan: true
    check_inf: true
    check_zero_variance: true
  eeg_plateau_window:
    min_seconds: 3.0
    max_seconds: 10.0
    required: true

###################################################################
# Logging
###################################################################

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(message)s"
  file:
    enabled: true
    name: "train.log"
    mode: "w"
    encoding: "utf-8"

