name: Real Data Smoke

on:
  workflow_dispatch:
    inputs:
      eeg_bids_root:
        description: "EEG BIDS root path on the self-hosted runner"
        required: false
        default: "/Volumes/KINGSTON/data/bids_output/eeg"
      fmri_bids_root:
        description: "fMRI BIDS root path on the self-hosted runner"
        required: false
        default: "/Volumes/KINGSTON/data/bids_output/fmri"
      deriv_root:
        description: "Derivatives root path on the self-hosted runner"
        required: false
        default: "/Volumes/KINGSTON/data/derivatives"
      source_root:
        description: "Source data root path on the self-hosted runner"
        required: false
        default: "/Volumes/KINGSTON/data/source_data"
      task:
        description: "Task label used for dry-run fMRI analysis"
        required: false
        default: "thermalactive"
      require_data:
        description: "Fail instead of skip when data paths are missing"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 16 * * 1"

jobs:
  smoke:
    runs-on: self-hosted
    timeout-minutes: 45
    env:
      EEG_BIDS_ROOT: ${{ github.event.inputs.eeg_bids_root || '/Volumes/KINGSTON/data/bids_output/eeg' }}
      FMRI_BIDS_ROOT: ${{ github.event.inputs.fmri_bids_root || '/Volumes/KINGSTON/data/bids_output/fmri' }}
      DERIV_ROOT: ${{ github.event.inputs.deriv_root || '/Volumes/KINGSTON/data/derivatives' }}
      SOURCE_ROOT: ${{ github.event.inputs.source_root || '/Volumes/KINGSTON/data/source_data' }}
      TASK: ${{ github.event.inputs.task || 'thermalactive' }}
      REQUIRE_DATA: ${{ github.event.inputs.require_data == 'true' && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight data checks
        id: preflight
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          check_dir() {
            local label="$1"
            local path="$2"
            if [[ ! -d "$path" ]]; then
              echo "[missing] $label: $path"
              missing=1
              return
            fi
            echo "[ok] $label: $path"
          }

          check_subject_dirs() {
            local label="$1"
            local root="$2"
            shopt -s nullglob
            local dirs=("$root"/sub-*)
            shopt -u nullglob
            if (( ${#dirs[@]} == 0 )); then
              echo "[missing] $label has no sub-* folders: $root"
              missing=1
            else
              echo "[ok] $label subjects discovered: ${#dirs[@]}"
            fi
          }

          check_dir "EEG BIDS root" "$EEG_BIDS_ROOT"
          check_dir "fMRI BIDS root" "$FMRI_BIDS_ROOT"

          if [[ -d "$EEG_BIDS_ROOT" ]]; then
            check_subject_dirs "EEG BIDS root" "$EEG_BIDS_ROOT"
          fi
          if [[ -d "$FMRI_BIDS_ROOT" ]]; then
            check_subject_dirs "fMRI BIDS root" "$FMRI_BIDS_ROOT"
          fi

          if [[ ! -d "$DERIV_ROOT" ]]; then
            echo "[info] Derivatives root missing; creating: $DERIV_ROOT"
            mkdir -p "$DERIV_ROOT"
          else
            echo "[ok] Derivatives root: $DERIV_ROOT"
          fi

          if [[ ! -d "$SOURCE_ROOT" ]]; then
            echo "[info] Source root not found (optional for this smoke run): $SOURCE_ROOT"
          else
            echo "[ok] Source root: $SOURCE_ROOT"
          fi

          if (( missing != 0 )); then
            if [[ "$REQUIRE_DATA" == "1" ]]; then
              echo "Data missing and require_data=true; failing run."
              exit 1
            fi
            echo "Data missing; skipping real-data smoke checks."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Skip notice
        if: steps.preflight.outputs.skip == 'true'
        run: echo "Real-data smoke checks skipped because required datasets were not mounted."

      - name: Setup Python
        if: steps.preflight.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test deps
        if: steps.preflight.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Create runtime overrides for mounted data
        if: steps.preflight.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ci_real_overrides.json" <<EOF
          {
            "project": {
              "task": "${TASK}"
            },
            "paths": {
              "bids_root": "${EEG_BIDS_ROOT}",
              "bids_fmri_root": "${FMRI_BIDS_ROOT}",
              "deriv_root": "${DERIV_ROOT}",
              "source_data": "${SOURCE_ROOT}"
            }
          }
          EOF
          echo "EEG_PIPELINE_TUI_OVERRIDES=$RUNNER_TEMP/ci_real_overrides.json" >> "$GITHUB_ENV"

      - name: Simulated test tier (same as CI)
        if: steps.preflight.outputs.skip != 'true'
        run: |
          python -m compileall -q eeg_pipeline fmri_pipeline scripts tests
          python -m pytest -q

      - name: Real-data CLI smoke checks
        if: steps.preflight.outputs.skip != 'true'
        run: |
          set -euo pipefail
          python -m eeg_pipeline.cli.main info version --json
          python -m eeg_pipeline.cli.main info subjects --source bids --status --json
          python -m eeg_pipeline.cli.main info subjects --source bids_fmri --status --json
          python -m eeg_pipeline.cli.main validate quick --json
          python -m eeg_pipeline.cli.main fmri-analysis first-level \
            --all-subjects \
            --task "${TASK}" \
            --dry-run \
            --input-source bids_raw \
            --no-require-fmriprep \
            --cond-a-column pain_binary_coded \
            --cond-a-value 1 \
            --cond-b-column pain_binary_coded \
            --cond-b-value 0 \
            --no-plots
