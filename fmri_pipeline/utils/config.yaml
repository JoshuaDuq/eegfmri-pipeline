# ============================================================================
# FMRI PIPELINE CONFIGURATION FILE
# ============================================================================

# ============================================================================
# PATH CONFIGURATION
# ============================================================================

bids_root: "../BIDS/dataset"
fmriprep_root: "../bids_output"
derivatives_root: "../bids_output/derivatives"
eeg_derivatives_root: "C:/Users/joshu/EEG_fMRI_Analysis/eeg_pipeline/bids_output/derivatives"

resources:
  nps_weights_path: "resources/weights_NSF_grouppred_cvpcr.nii.gz"
  siips1_weights_path: "resources/nonnoc_v11_4_137subjmap_weighted_mean_3mm.nii.gz"
  reference_space: "MNI152NLin2009cAsym"
  reference_resolution: "03"

# ============================================================================
# SUBJECT & RUN CONFIGURATION
# ============================================================================

subjects: ["sub-0000", "sub-0001"]

task: "pain"
runs: [1, 2, 3, 4, 5, 6]

tasks:
  rest:
    name: "rest"
    acq: "p2s33mm"
    runs: [1]

# ============================================================================
# BIDS FILE NAMING CONVENTIONS
# ============================================================================

suffixes:
  events: "_events.tsv"
  confounds: "_desc-confounds_timeseries.tsv"
  bold_preproc: "_space-{space}_res-{res}_desc-preproc_bold.nii.gz"
  bold_mask: "_space-{space}_res-{res}_desc-brain_mask.nii.gz"
  anat_preproc: "_acq-{acq}_space-{space}_res-{res}_desc-preproc_T1w.nii.gz"

space: "MNI152NLin2009cAsym"
resolution: "2"
anat_acquisition: "mprageipat2"

# ============================================================================
# MRI ACQUISITION PARAMETERS
# ============================================================================

acquisition_params:
  tr: 0.9
  echo_time: 0.02
  flip_angle: 56
  multiband_factor: 3
  slice_timing: true
  
# ============================================================================
# GLM CONFIGURATION
# ============================================================================

glm:
  tr: 0.9
  hrf_model: "spm"
  
  high_pass_sec: 128
  drift_model: "cosine"
  
  hrf:
    model: "spm"
    include_derivative: false
    include_dispersion: false
  
  stim_onset_offset_sec: 3.0
  stim_dur_sec: 7.5
  expected_trials_per_run: 11
  expected_heat_trials_per_run: 11

  convert_to_percent_signal: false
  percent_signal_baseline_sec: 0.000
  percent_signal_min_baseline: 0.001
  
  temp_labels:
    - "temp44p3"
    - "temp45p3"
    - "temp46p3"
    - "temp47p3"
    - "temp48p3"
    - "temp49p3"
  
  temp_celsius_mapping:
    temp44p3: 44.3
    temp45p3: 45.3
    temp46p3: 46.3
    temp47p3: 47.3
    temp48p3: 48.3
    temp49p3: 49.3
  
  nuisance_events:
    - "feedback"
  
  contrasts:
    - name: "all_pain"
      type: "t"
      weights: [1, 1, 1, 1, 1, 1]
    - name: "high_vs_low_temp"
      type: "t"
      weights: [-1, -1, -1, 1, 1, 1]
    - name: "linear_temp"
      type: "t"
      weights: [-2.5, -1.5, -0.5, 0.5, 1.5, 2.5]
    - name: "quadratic_temp"
      type: "t"
      weights: [1, -1, -2, -2, -1, 1]
  
# ============================================================================
# CONFOUND REGRESSION
# ============================================================================

confounds:
  motion_24_params:
    - "trans_x"
    - "trans_y"
    - "trans_z"
    - "rot_x"
    - "rot_y"
    - "rot_z"
    - "trans_x_derivative1"
    - "trans_y_derivative1"
    - "trans_z_derivative1"
    - "rot_x_derivative1"
    - "rot_y_derivative1"
    - "rot_z_derivative1"
    - "trans_x_power2"
    - "trans_y_power2"
    - "trans_z_power2"
    - "rot_x_power2"
    - "rot_y_power2"
    - "rot_z_power2"
    - "trans_x_derivative1_power2"
    - "trans_y_derivative1_power2"
    - "trans_z_derivative1_power2"
    - "rot_x_derivative1_power2"
    - "rot_y_derivative1_power2"
    - "rot_z_derivative1_power2"
  
  motion_outlier_prefix: "motion_outlier"
  
  physiological:
    - "global_signal"
    - "csf"
    - "white_matter"
  
  compcor:
    enabled: false
    method: "acompcor"
    n_components: 5
  
  fd_threshold: null

# ============================================================================
# SIGNATURE SCORING CONFIGURATION
# ============================================================================

enabled_signatures:
  - "nps"
  - "siips1"

signature_metadata:
  nps:
    native_resolution_mm: 3.0
    native_voxel_volume_mm3: 27.0
    requires_beta_scale_factor: true
    min_overlap_pct: 98.0
  siips1:
    native_resolution_mm: 2.0
    resampled_to_mm: 3.0
    resampled_voxel_volume_mm3: 27.0
    requires_beta_scale_factor: false
    min_overlap_pct: 50.0

signature_scoring:
  score_grid_policy: "resample_betas_to_weights"
  apply_scale_factor_if_2mm: true
  fdr_q: 0.05
  q_label: "q0p05"
  bootstrap:
    enabled: false
    n_resamples: 10000
    ci_method: "percentile"

nps:
  score_grid_policy: "resample_betas_to_weights"
  apply_scale_factor_if_2mm: true
  fdr_q: 0.05
  q_label: "q0p05"
  bootstrap:
    enabled: false
    n_resamples: 10000
    ci_method: "percentile"

# ============================================================================
# ANALYSIS OUTPUT CONFIGURATION
# ============================================================================

outputs:
  pipeline_root_dir: "outputs"
  work_dir: "work"
  qc_dir: "outputs/qc"

  glm_dir: "outputs/firstlevel"
  group_dir: "outputs/group"

  signatures_root_dir: "outputs/signatures"
  nps_dir: "outputs/signatures/scores/nps"
  signatures_dir: "outputs/signatures"
  masks_dir: "outputs/reference_masks"

  figures_dir: "outputs/figures"
  reports_dir: "outputs/reports"
  
  save_nifti: true
  save_tsv: true
  save_json: true
  save_figures: true
  
  figure_dpi: 300
  figure_formats: ["png", "svg"]

# ============================================================================
# COMPUTATIONAL RESOURCES
# ============================================================================

parallelization:
  glm_threads: 1
  io_threads: 4
  n_jobs: 1
  memory_limit: null

# ============================================================================
# QUALITY CONTROL
# ============================================================================

qc:
  fd_summary: true
  fd_plot: true
  min_brain_coverage: 0.8
  motion_thresholds:
    fd_mean_warn: 0.3
    fd_max_warn: 2.0
  plot_design_matrix: true
  plot_contrast_matrix: true

# ============================================================================
# BEHAVIORAL DATA INTEGRATION
# ============================================================================

behavioral:
  rating_column: "vas_0_200"
  pain_binary_column: "pain_binary"
  temperature_column: "temp_celsius"
  trial_index_column: "trial_index"
  block_column: "block"
  
  parametric_modulation:
    enabled: false
    modulators:
      - column: "vas_0_200"
        demean: true
        orthogonalize: true

# ============================================================================
# PREPROCESSING VALIDATION
# ============================================================================

preprocessing:
  required_files:
    - "space-{space}_desc-preproc_bold.nii.gz"
    - "space-{space}_desc-brain_mask.nii.gz"
    - "desc-confounds_timeseries.tsv"
    - "events.tsv"
  
  smoothing:
    enabled: false
    fwhm: 6.0

# ============================================================================
# LOGGING & DEBUGGING
# ============================================================================

logging:
  level: "INFO"
  console: true
  file: true
  log_dir: "logs"

# ============================================================================
# METADATA
# ============================================================================

metadata:
  project_name: "EEG_fMRI_Pain_Study"
  description: "Thermal pain fMRI with simultaneous EEG"
  citation: "Add study citation here"
  config_version: "1.0.0"
  pipeline_version: "1.0.0"
  investigator: "Your Name"
  institution: "Centre de recherche CERVO"
