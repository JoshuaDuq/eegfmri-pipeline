[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "eeg-pipeline"
version = "0.0.0"
description = "EEG/fMRI analysis pipeline"
readme = "README.md"
requires-python = ">=3.9"

[tool.setuptools]
packages = ["eeg_pipeline"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-ra"
